<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment Confirmed — Black Room Academy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000;
      color: #fff;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .card {
      width: 100%;
      max-width: 480px;
      border: 1px solid #222;
      background: #0a0a0a;
      padding: 3rem 2.5rem;
      text-align: center;
    }

    .checkmark {
      width: 56px;
      height: 56px;
      border: 2px solid #fff;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 2rem;
      font-size: 1.5rem;
    }

    .logo {
      font-family: 'Space Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: #555;
      margin-bottom: 1.5rem;
    }

    h1 {
      font-family: 'Space Mono', monospace;
      font-size: 1.3rem;
      font-weight: 700;
      margin-bottom: 1rem;
      line-height: 1.3;
    }

    p {
      font-size: 0.85rem;
      color: #666;
      line-height: 1.7;
      margin-bottom: 2rem;
    }

    .divider {
      border: none;
      border-top: 1px solid #1a1a1a;
      margin: 1.5rem 0;
    }

    .btn-back {
      display: inline-block;
      font-family: 'Space Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #555;
      text-decoration: none;
      border: 1px solid #222;
      padding: 0.8rem 2rem;
      transition: color 0.15s, border-color 0.15s;
    }

    .btn-back:hover { color: #fff; border-color: #444; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">Black Room Miami</div>
    <div class="checkmark">✓</div>
    <h1>Payment Confirmed</h1>
    <p id="confirm-text">Confirming your enrollment…</p>
    <hr class="divider">
    <a href="/academy.html" class="btn-back">Back to Academy</a>
  </div>
  <script>
    (async function () {
      const params = new URLSearchParams(window.location.search);
      const sessionId = params.get('session_id');
      const text = document.getElementById('confirm-text');
      if (!sessionId) {
        text.textContent = 'Your enrollment has been processed. You will receive an email shortly with your access details.';
        return;
      }
      try {
        const res = await fetch('/api/verify-course-payment?session_id=' + encodeURIComponent(sessionId));
        const data = await res.json();
        if (res.ok && data.paid) {
          text.textContent = 'Your enrollment is confirmed and your payment was received. Check your email for confirmation and next steps.';
        } else {
          text.textContent = 'We received your visit, but could not confirm payment yet. If you were charged, please contact theblackroom.us@gmail.com.';
        }
      } catch (e) {
        text.textContent = 'Your enrollment has been processed. You will receive an email shortly with your access details.';
      }
    })();
  </script>
</body>
</html>
