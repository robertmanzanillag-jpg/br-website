<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Ver Video – Black Room</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    /* ===== RESET & BASE ===== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    :root {
      --bg-primary: #0a0a0a;
      --bg-secondary: #111111;
      --text-primary: #ffffff;
      --text-secondary: #888888;
      --border-color: #222222;
      --accent: #ffffff;
    }
    
    html, body {
      font-family: 'Inter', sans-serif;
      background: #0a0a0a;
      color: #fff;
      min-height: 100vh;
      line-height: 1.6;
    }
    
    .mono {
      font-family: 'Space Mono', monospace;
    }
    
    body {
      padding-top: 80px;
    }
    
    a {
      text-decoration: none;
      color: inherit;
    }
    
    /* ===== HEADER - COPY FROM INDEX.HTML ===== */
    .nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1000;
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(0, 0, 0, 0.9);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid #222222;
    }
    
    .nav-logo {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    
    .nav-logo img {
      height: 40px;
    }
    
    .nav-links {
      display: flex;
      gap: 2.5rem;
      list-style: none;
    }
    
    .nav-links a {
      font-family: 'Space Mono', monospace;
      font-size: 0.85rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #888888;
      transition: color 0.3s ease;
    }
    
    .nav-links a:hover {
      color: #ffffff;
    }
    
    .nav-actions {
      display: flex;
      align-items: center;
      gap: 1.5rem;
    }
    
    .nav-login {
      font-size: 1.2rem;
      color: #888888;
      transition: all 0.3s ease;
    }
    
    .nav-login:hover {
      color: #ffffff;
    }
    
    .nav-cart {
      position: relative;
      font-size: 1.2rem;
      cursor: pointer;
      color: #ffffff;
    }
    
    .cart-count {
      position: absolute;
      top: -8px;
      right: -8px;

      color: #000000;

      font-weight: 700;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      display: flex;

      justify-content: center;
    }
    
    .menu-toggle {
      display: none;
      flex-direction: column;
      gap: 5px;
      cursor: pointer;
      padding: 0.5rem;
      background: none;
      border: none;
    }
    
    .menu-toggle span {
      width: 24px;
      height: 2px;
      background: #ffffff;
    }
    
    /* Mobile Menu */
    .mobile-menu {
      display: none;
      position: fixed;
      top: 0;
      right: -100%;
      width: 280px;
      height: 100vh;
      background: rgba(0, 0, 0, 0.98);
      backdrop-filter: blur(20px);
      z-index: 1001;
      transition: right 0.3s ease;
      padding: 80px 2rem 2rem;
    }
    
    .mobile-menu.active {
      right: 0;
    }
    
    .mobile-close {
      position: absolute;
      top: 1rem;
      right: 1rem;
      font-size: 1.5rem;
      cursor: pointer;
      color: #fff;
    }
    
    .mobile-menu ul {
      list-style: none;
    }
    
    .mobile-menu li {
      margin-bottom: 1rem;
    }
    
    .mobile-menu a {
      font-family: 'Space Mono', monospace;
      display: block;
      font-size: 1rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      padding: 1rem;
      color: #888;
      transition: color 0.3s;
    }
    
    .mobile-menu a:hover {
      color: #fff;
    }
    
    @media (max-width: 992px) {
      .nav-links {
        display: none;
      }
      .menu-toggle {
        display: flex;
      }
      .mobile-menu {
        display: block;
      }
    }
    
    @media (max-width: 768px) {
      .nav {
        padding: 0.75rem 1rem;
      }
      .nav-logo img {
        height: 32px;
      }
      body {
        padding-top: 70px;
      }
    }
    
    /* ===== MAIN CONTENT ===== */
    .watch-container {
      display: grid;
      grid-template-columns: 1fr 350px;
      gap: 2rem;
      max-width: 1400px;
      margin: 0 auto;
      padding: 2rem;
      background: #0a0a0a;
    }
    
    @media (max-width: 1024px) {
      .watch-container {
        grid-template-columns: 1fr;
      }
    }
    
    @media (max-width: 768px) {
      .watch-container {
        padding: 1rem;
      }
    }
    
    /* ===== VIDEO PLAYER ===== */
    .video-player-wrapper {
      width: 100%;
      position: relative;
      background: #111;
      border-radius: 12px;
      overflow: hidden;
      aspect-ratio: 16/9;
    }
    
    .video-player-wrapper iframe {
      display: block;
      width: 100%;
      height: 100%;
      border: none;
      position: relative;
      z-index: 100;
    }
    
    .video-loading {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      min-height: 400px;
      background: #111;
      color: #888;
      font-size: 2rem;
    }
    
    .video-error {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;

      text-align: center;
      padding: 2rem;
    }
    
    .video-error i {
      font-size: 4rem;
    }
    
    .video-error h2 {

    }
    
    .video-error p {
      color: #888;
      font-size: 1rem;
    }
    
    .video-error a {
      background: #222;
      color: #fff;
      padding: 0.75rem 1.5rem;
      border-radius: 8px;
      margin-top: 1rem;
    }
    
    /* ===== VIDEO DETAILS ===== */
    .video-details {
      margin-top: 1.5rem;
    }
    
    .video-details h1 {
      font-family: 'Space Mono', monospace;
      font-size: 1.8rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      line-height: 1.3;

    .video-meta {

      color: #888;
      font-size: 0.85rem;
      margin-bottom: 1.5rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    
    .video-actions {
      display: flex;
      gap: 1rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid #222;
      flex-wrap: wrap;
    }
    
    .video-actions button {
      font-family: 'Space Mono', monospace;
      background: #222;
      color: #fff;
      border: 1px solid #333;
      padding: 0.7rem 1.2rem;
      border-radius: 0;
      cursor: pointer;
      display: flex;

      gap: 0.5rem;

      text-transform: uppercase;

      transition: all 0.3s ease;
    }
    
    .video-actions button:hover {
      background: #333;

    }
    
    .video-actions button.liked {
      background: #e63946;
      border-color: #e63946;
    }
    
    /* ===== INFO SECTIONS ===== */
    .info-section {
      margin-top: 2rem;
    }
    
    .info-section h3 {
      font-family: 'Space Mono', monospace;
      font-size: 1rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 1rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid #222;
    }
    
    .social-links {
      display: flex;
      flex-wrap: wrap;
      gap: 1.5rem;
    }
    
    .social-links a {
      font-family: 'Space Mono', monospace;
      color: #888;
      font-weight: 500;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      transition: color 0.3s;
    }
    
    .social-links a:hover {
      color: #fff;
    }
    
    .tracklist {
      font-family: 'Space Mono', monospace;
      list-style: none;
      color: #888;
      line-height: 2;
      font-size: 0.85rem;
    }

      text-transform: uppercase;
      letter-spacing: 0.5px;

    /* ===== SIDEBAR ===== */

      border-radius: 12px;
      padding: 1.5rem;

      display: block;

      font-weight: 400;
    }
    
    @media (max-width: 1024px) {
      .sidebar {
        max-height: none;
      }

  </style>
</head>

  <script>
    // ===== MOBILE MENU =====
    function toggleMenu() {
      document.getElementById('mobile-menu').classList.toggle('active');
    }
    
    // ===== CART COUNT =====
    function updateCartCount() {
      try {
        const cart = JSON.parse(localStorage.getItem('blackRoomCart') || '[]');
        const count = cart.reduce((sum, item) => sum + (item.quantity || 1), 0);
        document.getElementById('cart-count').textContent = count;
      } catch(e) {}
    }
    updateCartCount();
    
    // ===== VIDEO LOADING =====
    function getParam(key) {
      return new URLSearchParams(window.location.search).get(key);
    }
    
    function showError(message) {
      document.getElementById('video-player').innerHTML = `
        <div class="video-error">
          <i class="fas fa-exclamation-triangle"></i>
          <h2>Error al cargar video</h2>
          <p>${message}</p>
          <a href="/videos.html">Ver todos los videos</a>
        </div>
      `;
    }
    
    async function loadVideo() {
      const videoId = getParam('id') || getParam('v');
      const playerContainer = document.getElementById('video-player');
      
      console.log('📺 Loading video:', videoId);
      
      // Validate video ID
      if (!videoId || videoId === 'undefined' || videoId.trim() === '') {
        showError('No se proporcionó un ID de video válido');
        return;
      }
      
      // Create YouTube iframe immediately - SIMPLE AND DIRECT
      playerContainer.innerHTML = `
        <iframe 
          src="https://www.youtube.com/embed/${videoId}?autoplay=1&rel=0"
          style="display:block !important; width:100%; height:100%; aspect-ratio:16/9; position:relative; z-index:100; border:none;"
          allow="autoplay; encrypted-media; fullscreen"
          allowfullscreen
          title="Black Room Video">
        </iframe>
      `;
      
      console.log('✅ Iframe created for video:', videoId);
      
      // Load video info from YouTube API
      loadVideoInfo(videoId);
      loadRecommended();
    }
    
    async function loadVideoInfo(videoId) {
      const API_KEY = 'AIzaSyBQeCjv948kI1CJDd9fzK6WYyLCbyMwHG8';
      
      try {
        const response = await fetch(
          `https://www.googleapis.com/youtube/v3/videos?part=snippet,statistics&id=${videoId}&key=${API_KEY}`
        );
        
        if (response.ok) {
          const data = await response.json();
          if (data.items && data.items.length > 0) {
            const video = data.items[0];
            
            // Update title
            document.getElementById('video-title').textContent = video.snippet.title;
            
            // Update views
            const views = parseInt(video.statistics.viewCount || 0).toLocaleString();
            document.getElementById('view-count').textContent = `${views} vistas`;
            
            // Parse description for socials and tracklist
            const description = video.snippet.description || '';
            loadArtistSocials(description);
            loadTracklist(description);
            
            console.log('✅ Video info loaded:', video.snippet.title);
          }
        }
      } catch(e) {
        console.error('Error loading video info:', e);
      }
    }
    
    function loadArtistSocials(description) {
      const container = document.getElementById('artist-socials');
      const socials = [];
      
      // Extract social links from description
      const igMatch = description.match(/instagram\.com\/([a-zA-Z0-9_.]+)/i);
      const scMatch = description.match(/soundcloud\.com\/([a-zA-Z0-9_-]+)/i);
      const twMatch = description.match(/twitter\.com\/([a-zA-Z0-9_]+)/i);
      const xMatch = description.match(/x\.com\/([a-zA-Z0-9_]+)/i);
      
      if (igMatch) socials.push(`<a href="https://instagram.com/${igMatch[1]}" target="_blank">Instagram</a>`);
      if (scMatch) socials.push(`<a href="https://soundcloud.com/${scMatch[1]}" target="_blank">SoundCloud</a>`);
      if (twMatch) socials.push(`<a href="https://twitter.com/${twMatch[1]}" target="_blank">Twitter</a>`);
      if (xMatch) socials.push(`<a href="https://x.com/${xMatch[1]}" target="_blank">X</a>`);
      
      container.innerHTML = socials.length > 0 
        ? socials.join('') 
        : '<span class="empty-msg">No se encontraron redes sociales</span>';
    }
    
    function loadTracklist(description) {
      const container = document.getElementById('tracklist');
      const lines = description.split('\n').filter(line => {
        const trimmed = line.trim();
        return trimmed.match(/^\d+[.:)]?\s/) || 
               trimmed.match(/^[\-•]\s/) ||
               trimmed.match(/\d{1,2}:\d{2}/);
      });
      
      if (lines.length > 0) {
        container.innerHTML = lines.slice(0, 20).map(line => 
          `<li>${line.trim()}</li>`
        ).join('');
      } else {
        container.innerHTML = '<li class="empty-msg">No se encontró tracklist</li>';
      }
    }
    
    async function loadRecommended() {
      const container = document.getElementById('recommended-videos');
      const currentVideoId = getParam('id') || getParam('v');
      
      try {
        const response = await fetch('/api/youtube/latest?maxResults=15');
        if (response.ok) {
          const data = await response.json();
          const videos = data.items || data || [];
          
          if (videos && videos.length > 0) {
            const filteredVideos = videos.filter(v => {
              const vId = v.id?.videoId || v.id;
              return vId !== currentVideoId;
            }).slice(0, 8);
            
            container.innerHTML = filteredVideos.map(v => {
              const videoId = v.id?.videoId || v.id;
              const title = v.snippet?.title || v.title || 'Video';
              const thumb = v.snippet?.thumbnails?.medium?.url || v.thumbnail || '';
              
              return `
                <div class="recommended-item" onclick="window.location.href='/watch.html?id=${videoId}'">
                  <img src="${thumb}" alt="${title}" onerror="this.style.display='none'">
                  <div class="info">
                    ${title.substring(0, 50)}${title.length > 50 ? '...' : ''}
                  </div>
                </div>
              `;
            }).join('');
            
            console.log('✅ Loaded', filteredVideos.length, 'recommended videos');
          } else {
            container.innerHTML = '<span class="empty-msg">No hay videos recomendados</span>';
          }
        } else {
          console.error('API Error:', response.status);
          container.innerHTML = '<span class="empty-msg">Error cargando videos</span>';
        }
      } catch(e) {
        console.error('Error loading recommended:', e);
        container.innerHTML = '<span class="empty-msg">Error cargando videos</span>';
      }
    }
    
    // ===== LIKE BUTTON =====
    function toggleLike() {
      const btn = document.getElementById('like-btn');
      btn.classList.toggle('liked');
    }
    
    // ===== SHARE =====
    function shareVideo() {
      if (navigator.share) {
        navigator.share({
          title: document.getElementById('video-title').textContent,
          url: window.location.href
        });
      } else {
        navigator.clipboard.writeText(window.location.href);
        alert('Link copiado al portapapeles');
      }
    }

    // ===== PLAYLIST FUNCTIONS =====
    async function showPlaylistModal() {
      if (!localStorage.getItem("userName")) {
        showToast("You must log in to add videos to playlists");
        return;
      }

      document.getElementById('playlist-modal-overlay').classList.add('visible');
      document.getElementById('playlist-modal').classList.add('visible');
      await loadUserPlaylists();
    }

    function closePlaylistModal() {
      document.getElementById('playlist-modal-overlay').classList.remove('visible');
      document.getElementById('playlist-modal').classList.remove('visible');
      document.getElementById('new-playlist-name').value = '';
    }

    async function loadUserPlaylists() {
      const playlistList = document.getElementById('playlist-list');
      playlistList.innerHTML = '<p class="loading">Loading playlists...</p>';

      try {
        const response = await fetch('/api/playlists', {
          credentials: 'include'
        });

        if (response.ok) {
          const playlists = await response.json();

          if (playlists.length === 0) {
            playlistList.innerHTML = '<p class="no-playlists">No playlists yet. Create one below.</p>';
            return;
          }

          playlistList.innerHTML = playlists.map(playlist => `
            <div class="playlist-item" onclick="addToPlaylist('${playlist.id}', '${playlist.name.replace(/'/g, "\\'")}')">
              <span class="playlist-item-name">${playlist.name}</span>
              <span class="playlist-item-count">${playlist.video_count || 0} videos</span>
            </div>
          `).join('');
        } else {
          playlistList.innerHTML = '<p class="no-playlists">Error loading playlists</p>';
        }
      } catch (error) {
        console.error('Error loading playlists:', error);
        playlistList.innerHTML = '<p class="no-playlists">Error loading playlists</p>';
      }
    }

    async function addToPlaylist(playlistId, playlistName) {
      const videoId = getParam('id') || getParam('v');
      const title = document.getElementById('video-title').textContent;

      try {
        const response = await fetch(`/api/playlists/${playlistId}/videos`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          credentials: 'include',
          body: JSON.stringify({
            videoId: videoId,
            title: title
          })
        });

        if (response.ok) {
          showToast(`Added to "${playlistName}"`);
          closePlaylistModal();
        } else {
          const error = await response.json();
          showToast(error.error || 'Error adding video');
        }
      } catch (error) {
        console.error('Error adding to playlist:', error);
        showToast('Error adding video to playlist');
      }
    }

    async function createNewPlaylist() {
      const name = document.getElementById('new-playlist-name').value.trim();
      if (!name) {
        showToast('Enter a playlist name');
        return;
      }

      try {
        const response = await fetch('/api/playlists', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          credentials: 'include',
          body: JSON.stringify({ name: name })
        });

        if (response.ok) {
          const playlist = await response.json();
          document.getElementById('new-playlist-name').value = '';
          await addToPlaylist(playlist.id, name);
        } else {
          const error = await response.json();
          showToast(error.error || 'Error creating playlist');
        }
      } catch (error) {
        console.error('Error creating playlist:', error);
        showToast('Error creating playlist');
      }
    }

    function showToast(message) {
      const existing = document.querySelector('.toast');
      if (existing) existing.remove();
      
      const toast = document.createElement('div');
      toast.className = 'toast';
      toast.textContent = message;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }
    
    // ===== INIT =====
    document.addEventListener('DOMContentLoaded', loadVideo);
  </script>
</body>
</html>
