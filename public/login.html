<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Login - Black Room</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link rel="stylesheet" href="/css/main.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="/js/global-header.js"></script>
    <style>
      body {
        background: #000;
        color: #fff;
        font-family: "Inter", sans-serif;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        padding-top: 80px;
      }
      
      .auth-card {
        position: relative;
        background: #0a0a0a;
        width: 100%;
        max-width: 380px;
        margin: 80px auto;
        border: 1px solid rgba(255,255,255,0.1);
        z-index: 2;
      }

      .auth-card::before,
      .auth-card::after {
        content: '';
        position: absolute;
        width: 20px;
        height: 20px;
        border-color: rgba(255,255,255,0.4);
        border-style: solid;
        z-index: 2;
      }
      .auth-card::before { top: -1px; left: -1px; border-width: 2px 0 0 2px; }
      .auth-card::after { top: -1px; right: -1px; border-width: 2px 2px 0 0; }

      .auth-card .corner-bl, .auth-card .corner-br {
        position: absolute;
        width: 20px;
        height: 20px;
        border-color: rgba(255,255,255,0.4);
        border-style: solid;
        z-index: 2;
      }
      .auth-card .corner-bl { bottom: -1px; left: -1px; border-width: 0 0 2px 2px; }
      .auth-card .corner-br { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }

      .auth-card-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 1rem 1.5rem;
        border-bottom: 1px solid rgba(255,255,255,0.1);
      }
      .auth-card-header h2 {
        font-family: 'Space Mono', monospace;
        font-size: 0.8rem;
        text-transform: uppercase;
        letter-spacing: 0.15em;
        margin: 0;
      }

      .auth-card-body { padding: 2rem 1.5rem; }
      .auth-card label {
        display: block;
        font-family: 'Space Mono', monospace;
        font-size: 0.7rem;
        text-transform: uppercase;
        color: #888;
        margin-bottom: 0.5rem;
      }
      .auth-card input {
        width: 100%;
        padding: 0.9rem 1rem;
        margin-bottom: 1.25rem;
        border: 1px solid rgba(255,255,255,0.15);
        background: #000;
        color: #fff;
      }
      .auth-submit-btn {
        width: 100%;
        padding: 1rem;
        background: transparent;
        border: 1px solid rgba(255,255,255,0.3);
        font-family: 'Space Mono', monospace;
        font-size: 0.75rem;
        text-transform: uppercase;
        color: #fff;
        cursor: pointer;
      }
      .auth-card-footer {
        padding: 1rem 1.5rem;
        border-top: 1px solid rgba(255,255,255,0.1);
        text-align: center;
      }
      .auth-card-footer a {
        font-family: 'Space Mono', monospace;
        font-size: 0.7rem;
        color: #888;
        text-transform: uppercase;
        text-decoration: none;
      }
      #liquid-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; }
      .error { color: #e63946; font-size: 0.75rem; margin-bottom: 1rem; display: none; }
    </style>
  </head>
  <body>
    <div id="liquid-bg"></div>
    <div class="auth-card">
      <div class="corner-bl"></div><div class="corner-br"></div>
      <div class="auth-card-header"><h2>Sign In</h2></div>
      <div class="auth-card-body">
        <div id="error-message" class="error"></div>
        <form id="login-form">
          <label>Email</label><input type="email" name="username" required />
          <label>Password</label><input type="password" name="password" required />
          <button type="submit" class="auth-submit-btn">Sign In</button>
        </form>
      </div>
      <div class="auth-card-footer"><a href="register.html">Register</a></div>
    </div>
    <script src="/js/liquid-distortion.js"></script>
    <script>
      document.addEventListener('DOMContentLoaded', () => {
        initLiquidDistortion('liquid-bg', ['/images/calendario/fondo_calendario.png']);
        const form = document.getElementById("login-form");
        const btn  = form.querySelector("button[type=submit]");
        form.addEventListener("submit", async (e) => {
          e.preventDefault();
          const err = document.getElementById("error-message");
          err.style.display = "none";
          btn.disabled = true;
          btn.textContent = "Signing in…";
          try {
            const res = await fetch("/api/login", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              credentials: 'include',
              body: JSON.stringify({ username: e.target.username.value, password: e.target.password.value }),
            });
            const data = await res.json();
            if (data.success) {
              if (data.token) localStorage.setItem('authToken', data.token);
              if (data.user) {
                localStorage.setItem('userName', data.user.name || data.user.email);
                localStorage.setItem('fullName', data.user.fullName || data.user.name || data.user.email);
                localStorage.setItem('userEmail', data.user.email);
              }
              window.location.href = "/";
            } else {
              err.textContent = data.error || "Invalid credentials";
              err.style.display = "block";
              btn.disabled = false;
              btn.textContent = "Sign In";
            }
          } catch (ex) {
            err.textContent = "Connection error — please try again.";
            err.style.display = "block";
            btn.disabled = false;
            btn.textContent = "Sign In";
          }
        });
      });
    </script>
  </body>
</html>
