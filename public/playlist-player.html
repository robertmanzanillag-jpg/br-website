
<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Playlist Player – Black Room</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <style>
      /* Variables CSS */
      :root {
        --bg-primary: #050505;
        --bg-secondary: #121212;
        --bg-tertiary: #1a1a1a;
        --text-primary: #fff;
        --text-secondary: #a0a0a0;
        --accent-primary: #ffffff;
        --border-color: #282828;
        --button-primary-bg: #fff;
        --button-primary-text: #000;
        --button-secondary-bg: #222;
        --button-secondary-hover: #333;
        --transition-fast: all 0.2s ease;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: var(--bg-primary);
        color: var(--text-primary);
        font-family: "Inter", sans-serif;
        overflow: hidden;
      }

      /* Header */
      .playlist-header {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        background: rgba(0, 0, 0, 0.9);
        backdrop-filter: blur(10px);
        padding: 1rem 2rem;
        border-bottom: 1px solid var(--border-color);
        z-index: 100;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .playlist-info h1 {
        font-size: 1.5rem;
        margin-bottom: 0.5rem;
      }

      .playlist-meta {
        color: var(--text-secondary);
        font-size: 0.9rem;
      }

      .header-controls {
        display: flex;
        gap: 1rem;
        align-items: center;
      }

      .back-btn {
        background: var(--button-secondary-bg);
        color: var(--text-primary);
        border: none;
        padding: 0.8rem 1.5rem;
        border-radius: 8px;
        cursor: pointer;
        transition: var(--transition-fast);
      }

      .back-btn:hover {
        background: var(--button-secondary-hover);
      }

      /* Main Content */
      .player-container {
        display: grid;
        grid-template-columns: 1fr 400px;
        height: 100vh;
        padding-top: 80px;
      }

      /* Video Player */
      .video-section {
        background: #000;
        position: relative;
        display: flex;
        flex-direction: column;
      }

      #video-player {
        flex: 1;
        position: relative;
      }

      #video-player iframe {
        width: 100%;
        height: 100%;
        border: none;
      }

      /* Controls */
      .player-controls {
        background: var(--bg-secondary);
        padding: 1.5rem;
        border-top: 1px solid var(--border-color);
      }

      .current-track {
        margin-bottom: 1rem;
      }

      .current-track h3 {
        font-size: 1.2rem;
        margin-bottom: 0.5rem;
      }

      .current-track p {
        color: var(--text-secondary);
        font-size: 0.9rem;
      }

      .control-buttons {
        display: flex;
        gap: 1rem;
        align-items: center;
        justify-content: center;
        margin-bottom: 1rem;
      }

      .control-btn {
        background: var(--button-secondary-bg);
        color: var(--text-primary);
        border: none;
        padding: 0.8rem;
        border-radius: 50%;
        cursor: pointer;
        transition: var(--transition-fast);
        width: 50px;
        height: 50px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .control-btn:hover {
        background: var(--button-secondary-hover);
        transform: scale(1.1);
      }

      .control-btn.play-pause {
        width: 60px;
        height: 60px;
        background: var(--button-primary-bg);
        color: var(--button-primary-text);
      }

      .progress-bar {
        width: 100%;
        background: var(--bg-tertiary);
        height: 6px;
        border-radius: 3px;
        margin-bottom: 1rem;
        cursor: pointer;
      }

      .progress-fill {
        height: 100%;
        background: var(--accent-primary);
        border-radius: 3px;
        width: 0%;
        transition: width 0.1s ease;
      }

      /* Playlist Sidebar */
      .playlist-sidebar {
        background: var(--bg-secondary);
        border-left: 1px solid var(--border-color);
        overflow-y: auto;
        padding: 1.5rem;
      }

      .playlist-sidebar h3 {
        margin-bottom: 1.5rem;
        padding-bottom: 1rem;
        border-bottom: 1px solid var(--border-color);
      }

      .playlist-item {
        display: flex;
        gap: 1rem;
        padding: 1rem;
        border-radius: 8px;
        cursor: pointer;
        transition: var(--transition-fast);
        margin-bottom: 0.5rem;
      }

      .playlist-item:hover {
        background: var(--bg-tertiary);
      }

      .playlist-item.active {
        background: var(--bg-tertiary);
        border: 1px solid var(--accent-primary);
      }

      .playlist-item img {
        width: 60px;
        height: 34px;
        object-fit: cover;
        border-radius: 4px;
        flex-shrink: 0;
      }

      .playlist-item-info {
        flex: 1;
        min-width: 0;
      }

      .playlist-item-title {
        font-size: 0.9rem;
        line-height: 1.3;
        margin-bottom: 0.3rem;
        overflow: hidden;
        text-overflow: ellipsis;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
      }

      .playlist-item-index {
        color: var(--text-secondary);
        font-size: 0.8rem;
      }

      /* Responsive */
      @media (max-width: 1024px) {
        .player-container {
          grid-template-columns: 1fr;
          grid-template-rows: 1fr auto;
        }

        .playlist-sidebar {
          max-height: 300px;
          border-left: none;
          border-top: 1px solid var(--border-color);
        }
      }

      @media (max-width: 768px) {
        .playlist-header {
          padding: 1rem;
        }

        .playlist-info h1 {
          font-size: 1.2rem;
        }

        .header-controls {
          gap: 0.5rem;
        }

        .player-controls {
          padding: 1rem;
        }

        .control-buttons {
          gap: 0.8rem;
        }

        .control-btn {
          width: 45px;
          height: 45px;
        }

        .control-btn.play-pause {
          width: 55px;
          height: 55px;
        }
      }
    </style>
  </head>
  <body>
    <div class="playlist-header">
      <div class="playlist-info">
        <h1 id="playlist-title">Cargando Playlist...</h1>
        <div class="playlist-meta">
          <span id="current-position">1</span> de <span id="total-videos">0</span> videos
        </div>
      </div>
      <div class="header-controls">
        <button class="back-btn" onclick="goBack()">
          <i class="fas fa-arrow-left"></i> Volver
        </button>
      </div>
    </div>

    <div class="player-container">
      <div class="video-section">
        <div id="video-player">
          <!-- Video se carga aquí -->
        </div>
        
        <div class="player-controls">
          <div class="current-track">
            <h3 id="current-title">Cargando...</h3>
            <p id="current-description">Preparando reproducción...</p>
          </div>

          <div class="control-buttons">
            <button class="control-btn" id="prev-btn" onclick="previousVideo()">
              <i class="fas fa-step-backward"></i>
            </button>
            <button class="control-btn play-pause" id="play-pause-btn" onclick="togglePlayPause()">
              <i class="fas fa-pause"></i>
            </button>
            <button class="control-btn" id="next-btn" onclick="nextVideo()">
              <i class="fas fa-step-forward"></i>
            </button>
            <button class="control-btn" id="shuffle-btn" onclick="toggleShuffle()">
              <i class="fas fa-random"></i>
            </button>
            <button class="control-btn" id="repeat-btn" onclick="toggleRepeat()">
              <i class="fas fa-redo"></i>
            </button>
          </div>

          <div class="progress-bar" onclick="seekVideo(event)">
            <div class="progress-fill" id="progress-fill"></div>
          </div>
        </div>
      </div>

      <div class="playlist-sidebar">
        <h3>Lista de Reproducción</h3>
        <div id="playlist-items">
          <!-- Items se cargan aquí -->
        </div>
      </div>
    </div>

    <script>
      let currentPlaylist = [];
      let currentIndex = 0;
      let isPlaying = false;
      let isShuffled = false;
      let repeatMode = 'none'; // 'none', 'one', 'all'
      let originalPlaylist = [];
      let player = null;

      // Obtener parámetros de URL
      function getParam(name) {
        return new URLSearchParams(window.location.search).get(name);
      }

      // Inicializar cuando la página carga
      document.addEventListener('DOMContentLoaded', async () => {
        const playlistId = getParam('playlist');
        const startVideo = getParam('video');
        
        if (!playlistId) {
          alert('No se especificó playlist');
          goBack();
          return;
        }

        await loadPlaylist(playlistId, startVideo);
      });

      // Cargar playlist
      async function loadPlaylist(playlistId, startVideoId) {
        try {
          console.log(`🎵 Cargando playlist: ${playlistId}`);
          
          const response = await fetch(`/api/playlists/${playlistId}`, {
            credentials: 'include'
          });

          if (!response.ok) {
            const errorData = await response.json().catch(() => ({}));
            console.error('Error response:', response.status, errorData);
            
            if (response.status === 401) {
              alert('Debes iniciar sesión para ver esta playlist');
              window.location.href = 'login.html';
              return;
            } else if (response.status === 404) {
              alert('Playlist no encontrada o no tienes acceso a ella');
            } else {
              alert(`Error cargando playlist: ${errorData.error || 'Error desconocido'}`);
            }
            goBack();
            return;
          }

          const playlist = await response.json();
          console.log(`✅ Playlist cargada: ${playlist.name} con ${playlist.videos?.length || 0} videos`);
          
          if (!playlist.videos || playlist.videos.length === 0) {
            alert('La playlist está vacía');
            goBack();
            return;
          }

          currentPlaylist = [...playlist.videos];
          originalPlaylist = [...playlist.videos];

          // Actualizar header
          document.getElementById('playlist-title').textContent = playlist.name;
          document.getElementById('total-videos').textContent = currentPlaylist.length;

          // Encontrar video inicial
          if (startVideoId) {
            const startIndex = currentPlaylist.findIndex(v => v.videoId === startVideoId);
            if (startIndex !== -1) {
              currentIndex = startIndex;
            }
          }

          renderPlaylistItems();
          loadCurrentVideo();
          
        } catch (error) {
          console.error('Error:', error);
          alert('Error cargando la playlist');
          goBack();
        }
      }

      // Renderizar items de playlist
      function renderPlaylistItems() {
        const container = document.getElementById('playlist-items');
        
        container.innerHTML = currentPlaylist.map((video, index) => `
          <div class="playlist-item ${index === currentIndex ? 'active' : ''}" 
               onclick="playVideo(${index})">
            <img src="https://img.youtube.com/vi/${video.videoId}/mqdefault.jpg" 
                 alt="${video.title}"
                 onerror="this.src='images/logo.png'">
            <div class="playlist-item-info">
              <div class="playlist-item-title">${video.title}</div>
              <div class="playlist-item-index">${index + 1}. Video</div>
            </div>
          </div>
        `).join('');
      }

      // Cargar video actual
      function loadCurrentVideo() {
        if (currentIndex < 0 || currentIndex >= currentPlaylist.length) return;

        const video = currentPlaylist[currentIndex];
        const playerContainer = document.getElementById('video-player');

        // Crear iframe
        playerContainer.innerHTML = `
          <iframe id="youtube-iframe"
                  src="https://www.youtube.com/embed/${video.videoId}?autoplay=1&enablejsapi=1&rel=0"
                  allow="autoplay; encrypted-media; fullscreen"
                  allowfullscreen>
          </iframe>
        `;

        // Actualizar información
        document.getElementById('current-title').textContent = video.title;
        document.getElementById('current-description').textContent = `Video ${currentIndex + 1} de ${currentPlaylist.length}`;
        document.getElementById('current-position').textContent = currentIndex + 1;

        // Actualizar lista
        renderPlaylistItems();

        // Configurar auto-advance (después de que termine el video)
        setTimeout(() => {
          setupVideoEndHandler();
        }, 3000);
      }

      // Configurar detección de fin de video
      function setupVideoEndHandler() {
        // Simular avance automático después de un tiempo estimado
        // En una implementación real, usarías la API de YouTube
        setTimeout(() => {
          if (isPlaying) {
            nextVideo();
          }
        }, 180000); // 3 minutos como estimado
      }

      // Reproducir video específico
      function playVideo(index) {
        if (index >= 0 && index < currentPlaylist.length) {
          currentIndex = index;
          loadCurrentVideo();
          isPlaying = true;
          updatePlayPauseButton();
        }
      }

      // Video anterior
      function previousVideo() {
        if (currentIndex > 0) {
          currentIndex--;
          loadCurrentVideo();
        } else if (repeatMode === 'all') {
          currentIndex = currentPlaylist.length - 1;
          loadCurrentVideo();
        }
      }

      // Video siguiente
      function nextVideo() {
        if (repeatMode === 'one') {
          loadCurrentVideo();
          return;
        }

        if (currentIndex < currentPlaylist.length - 1) {
          currentIndex++;
          loadCurrentVideo();
        } else if (repeatMode === 'all') {
          currentIndex = 0;
          loadCurrentVideo();
        } else {
          // Fin de playlist
          isPlaying = false;
          updatePlayPauseButton();
        }
      }

      // Toggle play/pause
      function togglePlayPause() {
        isPlaying = !isPlaying;
        updatePlayPauseButton();
        
        // En una implementación real, controlarías el player de YouTube
        console.log(isPlaying ? 'Playing' : 'Paused');
      }

      // Actualizar botón play/pause
      function updatePlayPauseButton() {
        const btn = document.getElementById('play-pause-btn');
        const icon = btn.querySelector('i');
        
        if (isPlaying) {
          icon.className = 'fas fa-pause';
        } else {
          icon.className = 'fas fa-play';
        }
      }

      // Toggle shuffle
      function toggleShuffle() {
        isShuffled = !isShuffled;
        const btn = document.getElementById('shuffle-btn');
        
        if (isShuffled) {
          btn.style.color = 'var(--accent-primary)';
          shufflePlaylist();
        } else {
          btn.style.color = 'var(--text-primary)';
          currentPlaylist = [...originalPlaylist];
          renderPlaylistItems();
        }
      }

      // Mezclar playlist
      function shufflePlaylist() {
        const currentVideo = currentPlaylist[currentIndex];
        const otherVideos = currentPlaylist.filter((_, i) => i !== currentIndex);
        
        // Mezclar otros videos
        for (let i = otherVideos.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [otherVideos[i], otherVideos[j]] = [otherVideos[j], otherVideos[i]];
        }

        // Reconstruir playlist con video actual al inicio
        currentPlaylist = [currentVideo, ...otherVideos];
        currentIndex = 0;
        renderPlaylistItems();
      }

      // Toggle repeat
      function toggleRepeat() {
        const modes = ['none', 'all', 'one'];
        const currentModeIndex = modes.indexOf(repeatMode);
        repeatMode = modes[(currentModeIndex + 1) % modes.length];
        
        const btn = document.getElementById('repeat-btn');
        const icon = btn.querySelector('i');
        
        switch (repeatMode) {
          case 'none':
            btn.style.color = 'var(--text-primary)';
            icon.className = 'fas fa-redo';
            break;
          case 'all':
            btn.style.color = 'var(--accent-primary)';
            icon.className = 'fas fa-redo';
            break;
          case 'one':
            btn.style.color = 'var(--accent-primary)';
            icon.className = 'fas fa-redo';
            // Agregar indicador visual para repeat one
            break;
        }
      }

      // Buscar en video
      function seekVideo(event) {
        const progressBar = event.currentTarget;
        const rect = progressBar.getBoundingClientRect();
        const percentage = (event.clientX - rect.left) / rect.width;
        
        // En una implementación real, usarías la API de YouTube para buscar
        document.getElementById('progress-fill').style.width = (percentage * 100) + '%';
      }

      // Volver atrás
      function goBack() {
        if (document.referrer) {
          window.history.back();
        } else {
          window.location.href = 'profile.html';
        }
      }

      // Actualizar progreso (simulado)
      setInterval(() => {
        if (isPlaying) {
          const progressFill = document.getElementById('progress-fill');
          let currentWidth = parseFloat(progressFill.style.width) || 0;
          
          if (currentWidth < 100) {
            progressFill.style.width = (currentWidth + 0.1) + '%';
          } else {
            // Fin de video
            nextVideo();
          }
        }
      }, 100);
    </script>
  <script src="/js/responsive-header.js"></script>
</body>
</html>
