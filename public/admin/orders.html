<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sales Orders — Black Room Admin</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #000;
      --card: #0d0d0d;
      --border: #1a1a1a;
      --border2: #272727;
      --text: #fff;
      --muted: #555;
      --muted2: #888;
      --accent: #ff2233;
      --green: #22c55e;
      --blue: #3b82f6;
      --row-h: 48px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 90px 0 60px; }

    /* PAGE HEADER */
    .page-header { max-width: 1500px; margin: 0 auto 28px; padding: 0 24px; display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap; }
    .ph-left { display: flex; align-items: center; gap: 14px; }
    .logo-box { width: 40px; height: 40px; border: 1px solid var(--border2); display: grid; place-items: center; font-family: 'Space Mono', monospace; font-size: 12px; color: var(--muted2); }
    .page-title { font-family: 'Space Mono', monospace; font-size: 1rem; letter-spacing: 3px; text-transform: uppercase; }
    .page-sub { font-size: 10px; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; margin-top: 3px; }
    .ph-right { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    .btn-sm { font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; background: transparent; border: 1px solid var(--border2); color: var(--muted2); padding: 8px 14px; cursor: pointer; transition: all .2s; display: flex; align-items: center; gap: 7px; text-decoration: none; }
    .btn-sm:hover { border-color: #444; color: var(--text); }

    /* SUMMARY CARDS */
    .summary-grid { max-width: 1500px; margin: 0 auto 28px; padding: 0 24px; display: grid; grid-template-columns: repeat(4,1fr); gap: 12px; }
    @media(max-width:900px){.summary-grid{grid-template-columns:repeat(2,1fr);}}
    @media(max-width:540px){.summary-grid{grid-template-columns:1fr;}}
    .sum-card { background: var(--card); border: 1px solid var(--border2); padding: 20px 22px; position: relative; overflow: hidden; }
    .sum-card::after { content:''; position: absolute; bottom: 0; left: 0; right: 0; height: 2px; background: var(--accent); }
    .sum-card.blue::after { background: var(--blue); }
    .sum-card.green::after { background: var(--green); }
    .sum-card.purple::after { background: #a855f7; }
    .sc-icon { width: 36px; height: 36px; border: 1px solid var(--border2); display: grid; place-items: center; margin-bottom: 14px; font-size: 14px; color: var(--muted2); }
    .sc-label { font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted2); margin-bottom: 6px; }
    .sc-val { font-family: 'Space Mono', monospace; font-size: 1.6rem; font-weight: 700; color: var(--text); }
    .sc-desc { font-size: 11px; color: var(--muted); margin-top: 4px; }

    /* PANEL */
    .panel-wrap { max-width: 1500px; margin: 0 auto; padding: 0 24px; }

    /* CONTROLS */
    .controls { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; }
    .search-wrap { position: relative; flex: 1; min-width: 200px; max-width: 320px; }
    .search-wrap i { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 11px; }
    .search-wrap input { width: 100%; background: var(--card); border: 1px solid var(--border2); color: var(--text); font-family: 'Inter', sans-serif; font-size: 13px; padding: 8px 12px 8px 32px; outline: none; transition: border-color .2s; }
    .search-wrap input:focus { border-color: #333; }
    .search-wrap input::placeholder { color: var(--muted); }
    .stats-label { margin-left: auto; font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 1.5px; color: var(--muted); text-transform: uppercase; }

    /* TABLE */
    .table-wrap { overflow-x: auto; border: 1px solid var(--border); }
    table { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 900px; table-layout: fixed; }
    col.col-date  { width: 100px; }
    col.col-name  { width: 160px; }
    col.col-email { width: 200px; }
    col.col-items { width: 220px; }
    col.col-amt   { width: 80px; }
    col.col-addr  { width: 220px; }
    col.col-act   { width: 110px; }
    thead tr { background: var(--card); border-bottom: 1px solid var(--border2); }
    th { font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); padding: 11px 12px; text-align: left; white-space: nowrap; cursor: pointer; user-select: none; overflow: hidden; }
    th:hover { color: var(--muted2); }
    th.sorted { color: var(--accent); }
    tbody tr { border-bottom: 1px solid var(--border); height: var(--row-h); cursor: pointer; transition: background .1s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #0f0f0f; }
    td { padding: 0 12px; height: var(--row-h); vertical-align: middle; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 0; }
    .cell-date { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--muted); }
    .cell-amt { font-family: 'Space Mono', monospace; font-size: 12px; color: var(--green); font-weight: 700; }
    .clink { color: var(--text); text-decoration: none; border-bottom: 1px dashed transparent; transition: all .15s; display: inline-flex; align-items: center; gap: 5px; max-width: 100%; overflow: hidden; text-overflow: ellipsis; }
    .clink:hover { color: var(--accent); border-bottom-color: var(--accent); }
    .clink i { font-size: 10px; opacity: .5; flex-shrink: 0; }
    .clink:hover i { opacity: 1; }
    .actions { display: flex; gap: 4px; align-items: center; }
    .btn-act { background: transparent; border: 1px solid var(--border2); color: var(--muted2); font-size: 10px; padding: 5px 9px; cursor: pointer; transition: all .15s; font-family: 'Space Mono', monospace; white-space: nowrap; display: flex; align-items: center; gap: 4px; }
    .btn-act:hover { border-color: #444; color: var(--text); }
    .btn-act.ship { border-color: rgba(59,130,246,.4); color: var(--blue); }
    .btn-act.ship:hover { background: rgba(59,130,246,.08); border-color: var(--blue); }

    /* EMPTY / LOADING */
    .empty { padding: 60px; text-align: center; }
    .empty i { font-size: 1.8rem; color: var(--border2); margin-bottom: 12px; display: block; }
    .empty p { font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; }
    .loading { display: flex; align-items: center; justify-content: center; gap: 10px; padding: 60px; font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; }
    .spinner { width: 14px; height: 14px; border: 2px solid var(--border2); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* TOAST */
    .toast { position: fixed; bottom: 28px; right: 28px; background: var(--card); border: 1px solid var(--border2); color: var(--text); font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; padding: 12px 18px; z-index: 9999; opacity: 0; transform: translateY(8px); transition: all .25s; pointer-events: none; display: flex; align-items: center; gap: 9px; }
    .toast.show { opacity: 1; transform: translateY(0); }
    .toast.ok  { border-left: 2px solid var(--green); }
    .toast.err { border-left: 2px solid var(--accent); }

    /* DRAWER */
    .drawer-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 800; opacity: 0; pointer-events: none; transition: opacity .25s; }
    .drawer-overlay.open { opacity: 1; pointer-events: all; }
    .drawer { position: fixed; top: 0; right: 0; width: 420px; max-width: 95vw; height: 100vh; background: #0a0a0a; border-left: 1px solid var(--border2); z-index: 801; transform: translateX(100%); transition: transform .3s cubic-bezier(.16,1,.3,1); overflow-y: auto; display: flex; flex-direction: column; }
    .drawer.open { transform: translateX(0); }
    .drawer-head { padding: 22px 22px 18px; border-bottom: 1px solid var(--border); display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; position: sticky; top: 0; background: #0a0a0a; z-index: 1; }
    .drawer-name { font-family: 'Space Mono', monospace; font-size: 14px; letter-spacing: 1px; color: var(--text); }
    .drawer-tag { font-size: 10px; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; margin-top: 4px; }
    .drawer-close { background: transparent; border: 1px solid var(--border2); color: var(--muted2); width: 30px; height: 30px; cursor: pointer; font-size: 14px; flex-shrink: 0; transition: all .2s; }
    .drawer-close:hover { border-color: #444; color: var(--text); }
    .drawer-body { padding: 20px 22px; flex: 1; }
    .drawer-field { margin-bottom: 18px; }
    .df-label { font-family: 'Space Mono', monospace; font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 5px; }
    .df-value { font-size: 13px; color: var(--text); line-height: 1.5; word-break: break-word; }
    .df-value.muted { color: var(--muted2); }
    .drawer-divider { border: none; border-top: 1px solid var(--border); margin: 20px 0; }
    .drawer-actions { padding: 18px 22px; border-top: 1px solid var(--border); display: flex; flex-direction: column; gap: 10px; position: sticky; bottom: 0; background: #0a0a0a; }
    .drawer-btn { width: 100%; font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; padding: 12px; border: 1px solid var(--border2); background: transparent; color: var(--muted2); cursor: pointer; transition: all .2s; display: flex; align-items: center; justify-content: center; gap: 8px; text-decoration: none; }
    .drawer-btn:hover { border-color: #444; color: var(--text); }
    .drawer-btn.primary { border-color: rgba(59,130,246,.5); color: var(--blue); }
    .drawer-btn.primary:hover { background: rgba(59,130,246,.08); border-color: var(--blue); }
    .drawer-btn.email { border-color: rgba(34,197,94,.4); color: var(--green); }
    .drawer-btn.email:hover { background: rgba(34,197,94,.08); border-color: var(--green); }

    /* ITEMS LIST */
    .items-list { background: #111; border: 1px solid var(--border2); padding: 0; list-style: none; }
    .items-list li { padding: 10px 14px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; font-size: 13px; }
    .items-list li:last-child { border-bottom: none; }
    .item-name { color: var(--text); }
    .item-qty { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--muted2); }
    .item-price { font-family: 'Space Mono', monospace; font-size: 12px; color: var(--green); }

    /* SHIP MODAL */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.9); z-index: 900; display: none; place-items: center; padding: 20px; }
    .modal-overlay.open { display: grid; }
    .modal { background: var(--card); border: 1px solid var(--border2); padding: 32px; max-width: 460px; width: 100%; }
    .modal-title { font-family: 'Space Mono', monospace; font-size: 13px; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 6px; }
    .modal-sub { font-size: 12px; color: var(--muted2); margin-bottom: 24px; line-height: 1.5; }
    .form-group { margin-bottom: 16px; }
    .form-label { font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted2); margin-bottom: 6px; display: block; }
    .form-input { width: 100%; background: #111; border: 1px solid var(--border2); color: var(--text); font-family: 'Inter', sans-serif; font-size: 13px; padding: 10px 12px; outline: none; transition: border-color .2s; resize: none; }
    .form-input:focus { border-color: #444; }
    .form-input::placeholder { color: var(--muted); }
    .modal-btns { display: flex; gap: 10px; margin-top: 24px; }
    .modal-btns button { flex: 1; font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; padding: 12px; border: 1px solid var(--border2); background: transparent; color: var(--muted2); cursor: pointer; transition: all .2s; display: flex; align-items: center; justify-content: center; gap: 6px; }
    .modal-btns .send-btn { border-color: rgba(59,130,246,.5); color: var(--blue); }
    .modal-btns .send-btn:hover { background: rgba(59,130,246,.1); border-color: var(--blue); }
    .modal-btns .cancel-btn:hover { border-color: #444; color: var(--text); }
    .modal-btns button:disabled { opacity: .4; cursor: not-allowed; }
  </style>
</head>
<body>

<div id="global-header-placeholder"></div>
<script src="/js/global-header.js"></script>

<!-- TOAST -->
<div class="toast" id="toast"><i class="fas fa-check" id="toastIcon"></i><span id="toastMsg"></span></div>

<!-- DRAWER OVERLAY -->
<div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <div class="drawer-head">
    <div>
      <div class="drawer-name" id="drawerName">—</div>
      <div class="drawer-tag" id="drawerTag">—</div>
    </div>
    <button class="drawer-close" onclick="closeDrawer()">✕</button>
  </div>
  <div class="drawer-body" id="drawerBody"></div>
  <div class="drawer-actions" id="drawerActions"></div>
</div>

<!-- SHIP MODAL -->
<div class="modal-overlay" id="shipModal">
  <div class="modal">
    <div class="modal-title"><i class="fas fa-truck"></i> Send Shipping Email</div>
    <div class="modal-sub" id="shipModalSub">Sending to: —</div>
    <div class="form-group">
      <label class="form-label">Tracking Number <span style="color:var(--muted)">(optional)</span></label>
      <input class="form-input" id="trackingNumber" placeholder="e.g. 1Z999AA10123456784">
    </div>
    <div class="form-group">
      <label class="form-label">Carrier <span style="color:var(--muted)">(optional)</span></label>
      <input class="form-input" id="carrierName" placeholder="e.g. UPS, FedEx, USPS">
    </div>
    <div class="form-group">
      <label class="form-label">Custom Message <span style="color:var(--muted)">(optional)</span></label>
      <textarea class="form-input" id="shipMessage" rows="3" placeholder="Any additional info for the customer…"></textarea>
    </div>
    <div class="modal-btns">
      <button class="cancel-btn" onclick="closeShipModal()">Cancel</button>
      <button class="send-btn" id="sendShipBtn" onclick="sendShippingEmail()"><i class="fas fa-paper-plane"></i> Send Email</button>
    </div>
  </div>
</div>

<!-- PAGE HEADER -->
<div class="page-header">
  <div class="ph-left">
    <div class="logo-box">BR</div>
    <div>
      <div class="page-title">Sales Orders</div>
      <div class="page-sub">Shop Transactions</div>
    </div>
  </div>
  <div class="ph-right">
    <button class="btn-sm" onclick="exportCSV()"><i class="fas fa-download"></i> Export CSV</button>
    <button class="btn-sm" onclick="loadOrders()"><i class="fas fa-sync-alt"></i> Refresh</button>
    <a href="/admin/applications.html" class="btn-sm"><i class="fas fa-arrow-left"></i> Admin</a>
  </div>
</div>

<!-- SUMMARY CARDS -->
<div class="summary-grid">
  <div class="sum-card">
    <div class="sc-icon"><i class="fas fa-shopping-bag"></i></div>
    <div class="sc-label">Total Orders</div>
    <div class="sc-val" id="s-orders">—</div>
    <div class="sc-desc">Paid shop orders</div>
  </div>
  <div class="sum-card green">
    <div class="sc-icon"><i class="fas fa-dollar-sign"></i></div>
    <div class="sc-label">Total Revenue</div>
    <div class="sc-val" id="s-revenue">—</div>
    <div class="sc-desc">USD from all orders</div>
  </div>
  <div class="sum-card blue">
    <div class="sc-icon"><i class="fas fa-users"></i></div>
    <div class="sc-label">Customers</div>
    <div class="sc-val" id="s-customers">—</div>
    <div class="sc-desc">Unique buyer emails</div>
  </div>
  <div class="sum-card purple">
    <div class="sc-icon"><i class="fas fa-box"></i></div>
    <div class="sc-label">Items Sold</div>
    <div class="sc-val" id="s-items">—</div>
    <div class="sc-desc">Total units across orders</div>
  </div>
</div>

<!-- TABLE -->
<div class="panel-wrap">
  <div class="controls">
    <div class="search-wrap"><i class="fas fa-search"></i><input type="text" id="searchInput" placeholder="Search name, email, product…" oninput="renderTable()"></div>
    <span class="stats-label" id="statsLabel">— orders</span>
  </div>
  <div class="table-wrap" id="tableWrap">
    <div class="loading"><div class="spinner"></div> Loading orders…</div>
  </div>
</div>

<script>
  let allOrders = [];
  let currentSessionId = null;

  async function loadOrders() {
    document.getElementById('tableWrap').innerHTML = '<div class="loading"><div class="spinner"></div> Loading orders…</div>';
    try {
      const res = await fetch('/api/admin/orders');
      if (res.status === 403) { window.location.href = '/profile.html'; return; }
      const data = await res.json();
      if (!data.success) throw new Error(data.error || 'Failed to load');
      allOrders = data.orders;
      updateSummary();
      renderTable();
    } catch (e) {
      document.getElementById('tableWrap').innerHTML = `<div class="empty"><i class="fas fa-exclamation-circle"></i><p>${esc(e.message)}</p></div>`;
    }
  }

  function updateSummary() {
    const total = allOrders.length;
    const revenue = allOrders.reduce((s, o) => s + parseFloat(o.amount), 0);
    const customers = new Set(allOrders.map(o => o.customerEmail)).size;
    const items = allOrders.reduce((s, o) => s + o.items.reduce((a, i) => a + i.qty, 0), 0);
    document.getElementById('s-orders').textContent = total;
    document.getElementById('s-revenue').textContent = '$' + revenue.toFixed(2);
    document.getElementById('s-customers').textContent = customers;
    document.getElementById('s-items').textContent = items;
  }

  function renderTable() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    let rows = allOrders;
    if (q) rows = rows.filter(o =>
      o.customerName.toLowerCase().includes(q) ||
      o.customerEmail.toLowerCase().includes(q) ||
      o.shippingAddress.toLowerCase().includes(q) ||
      o.items.some(i => i.name && i.name.toLowerCase().includes(q))
    );

    document.getElementById('statsLabel').textContent = `${rows.length} order${rows.length !== 1 ? 's' : ''}`;

    if (!rows.length) {
      document.getElementById('tableWrap').innerHTML = '<div class="empty"><i class="fas fa-inbox"></i><p>' + (q ? 'No results' : 'No orders yet') + '</p></div>';
      return;
    }

    const html = `
      <table>
        <colgroup>
          <col class="col-date"><col class="col-name"><col class="col-email">
          <col class="col-items"><col class="col-amt"><col class="col-addr"><col class="col-act">
        </colgroup>
        <thead><tr>
          <th>Date</th><th>Customer</th><th>Email</th>
          <th>Items</th><th>Total</th><th>Ship To</th><th>Actions</th>
        </tr></thead>
        <tbody>
          ${rows.map(o => `
            <tr onclick="openDrawer('${esc(o.id)}')">
              <td class="cell-date">${fmtDate(o.date)}</td>
              <td title="${esc(o.customerName)}">${esc(o.customerName)}</td>
              <td title="${esc(o.customerEmail)}">
                <a class="clink" href="mailto:${esc(o.customerEmail)}" onclick="event.stopPropagation()">
                  <i class="fas fa-envelope"></i>${esc(o.customerEmail)}
                </a>
              </td>
              <td title="${esc(o.items.map(i=>i.name).join(', '))}">${esc(o.items.map(i => `${i.name} ×${i.qty}`).join(', ') || '—')}</td>
              <td class="cell-amt">$${esc(o.amount)}</td>
              <td title="${esc(o.shippingAddress)}">${esc(o.shippingAddress)}</td>
              <td>
                <div class="actions" onclick="event.stopPropagation()">
                  <a class="btn-act" href="mailto:${esc(o.customerEmail)}" title="Send email"><i class="fas fa-envelope"></i></a>
                  <button class="btn-act ship" onclick="openShipModal('${esc(o.id)}','${esc(o.customerEmail)}')" title="Send shipping confirmation">
                    <i class="fas fa-truck"></i> Ship
                  </button>
                </div>
              </td>
            </tr>`).join('')}
        </tbody>
      </table>`;
    document.getElementById('tableWrap').innerHTML = html;
  }

  function openDrawer(id) {
    const o = allOrders.find(x => x.id === id);
    if (!o) return;
    document.getElementById('drawerName').textContent = o.customerName;
    document.getElementById('drawerTag').textContent = `Order · ${fmtDate(o.date)} · $${o.amount} ${o.currency}`;

    const addrRaw = o.shippingAddressRaw;
    const addrBlock = addrRaw ? `
      <div style="font-size:13px;color:var(--text);line-height:1.7">
        ${addrRaw.line1 ? esc(addrRaw.line1) + '<br>' : ''}
        ${addrRaw.line2 ? esc(addrRaw.line2) + '<br>' : ''}
        ${addrRaw.city || ''}${addrRaw.state ? ', ' + addrRaw.state : ''} ${addrRaw.postal_code || ''}<br>
        ${addrRaw.country || ''}
      </div>` : `<div class="df-value muted">—</div>`;

    const itemsHtml = o.items.length
      ? `<ul class="items-list">${o.items.map(i => `
          <li>
            <span class="item-name">${esc(i.name)}</span>
            <span style="display:flex;align-items:center;gap:10px">
              <span class="item-qty">×${i.qty}</span>
              <span class="item-price">$${i.amount}</span>
            </span>
          </li>`).join('')}</ul>`
      : '<div class="df-value muted">—</div>';

    document.getElementById('drawerBody').innerHTML = `
      <div class="drawer-field">
        <div class="df-label">Customer</div>
        <div class="df-value">${esc(o.customerName)}</div>
      </div>
      <div class="drawer-field">
        <div class="df-label">Email</div>
        <div class="df-value"><a class="clink" href="mailto:${esc(o.customerEmail)}"><i class="fas fa-envelope"></i>${esc(o.customerEmail)}</a></div>
      </div>
      ${o.phone && o.phone !== '—' ? `<div class="drawer-field"><div class="df-label">Phone</div><div class="df-value"><a class="clink" href="tel:${esc(o.phone)}"><i class="fas fa-phone"></i>${esc(o.phone)}</a></div></div>` : ''}
      <hr class="drawer-divider">
      <div class="drawer-field">
        <div class="df-label">Shipping Address</div>
        ${addrBlock}
      </div>
      <hr class="drawer-divider">
      <div class="drawer-field">
        <div class="df-label">Order Items</div>
        ${itemsHtml}
      </div>
      <div class="drawer-field">
        <div class="df-label">Order Total</div>
        <div class="df-value" style="color:var(--green);font-family:'Space Mono',monospace;font-size:1.1rem;font-weight:700">$${esc(o.amount)} ${esc(o.currency)}</div>
      </div>
      <div class="drawer-field">
        <div class="df-label">Stripe Session ID</div>
        <div class="df-value" style="font-family:'Space Mono',monospace;font-size:11px;color:var(--muted2);word-break:break-all">${esc(o.id)}</div>
      </div>`;

    document.getElementById('drawerActions').innerHTML = `
      <a class="drawer-btn email" href="mailto:${esc(o.customerEmail)}"><i class="fas fa-envelope"></i> Email Customer</a>
      <button class="drawer-btn primary" onclick="openShipModal('${esc(o.id)}','${esc(o.customerEmail)}')"><i class="fas fa-truck"></i> Send Shipping Confirmation</button>`;

    document.getElementById('drawerOverlay').classList.add('open');
    document.getElementById('drawer').classList.add('open');
  }

  function closeDrawer() {
    document.getElementById('drawerOverlay').classList.remove('open');
    document.getElementById('drawer').classList.remove('open');
  }

  function openShipModal(sessionId, email) {
    currentSessionId = sessionId;
    document.getElementById('shipModalSub').textContent = 'To: ' + email;
    document.getElementById('trackingNumber').value = '';
    document.getElementById('carrierName').value = '';
    document.getElementById('shipMessage').value = '';
    document.getElementById('shipModal').classList.add('open');
  }

  function closeShipModal() {
    document.getElementById('shipModal').classList.remove('open');
    currentSessionId = null;
  }

  async function sendShippingEmail() {
    if (!currentSessionId) return;
    const btn = document.getElementById('sendShipBtn');
    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> Sending…';
    try {
      const res = await fetch('/api/admin/send-shipping-email', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          sessionId: currentSessionId,
          trackingNumber: document.getElementById('trackingNumber').value.trim(),
          carrier: document.getElementById('carrierName').value.trim(),
          message: document.getElementById('shipMessage').value.trim()
        })
      });
      const data = await res.json();
      if (data.success) {
        closeShipModal();
        closeDrawer();
        toast('Shipping email sent ✓');
      } else {
        toast(data.error || 'Error sending email', 'err');
      }
    } catch (e) {
      toast('Network error', 'err');
    } finally {
      btn.disabled = false;
      btn.innerHTML = '<i class="fas fa-paper-plane"></i> Send Email';
    }
  }

  function exportCSV() {
    if (!allOrders.length) { toast('No orders to export', 'err'); return; }
    const rows = allOrders.map(o => ({
      Date: fmtDate(o.date),
      Name: o.customerName,
      Email: o.customerEmail,
      Phone: o.phone,
      Items: o.items.map(i => `${i.name} x${i.qty}`).join(' | '),
      Total: '$' + o.amount,
      'Ship To': o.shippingAddress,
      'Session ID': o.id
    }));
    const keys = Object.keys(rows[0]);
    const csv = [keys.join(','), ...rows.map(r => keys.map(k => `"${String(r[k]||'').replace(/"/g,'""')}"`).join(','))].join('\n');
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv' }));
    a.download = `blackroom-orders-${new Date().toISOString().slice(0,10)}.csv`;
    a.click();
    toast('CSV exported');
  }

  function fmtDate(d) {
    if (!d) return '—';
    return new Date(d).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  }
  function esc(s) {
    if (!s) return '';
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function toast(msg, type='ok') {
    const t = document.getElementById('toast');
    const m = document.getElementById('toastMsg');
    const ic = document.getElementById('toastIcon');
    t.className = `toast ${type} show`;
    m.textContent = msg;
    ic.className = type === 'ok' ? 'fas fa-check' : 'fas fa-times';
    clearTimeout(t._t);
    t._t = setTimeout(() => t.classList.remove('show'), 2800);
  }

  document.getElementById('shipModal').addEventListener('click', e => { if (e.target === e.currentTarget) closeShipModal(); });

  loadOrders();
</script>
</body>
</html>
