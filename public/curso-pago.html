<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Black Room DJ Academy — Enrollment</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000;
      color: #fff;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .card {
      width: 100%;
      max-width: 480px;
      border: 1px solid #222;
      background: #0a0a0a;
      padding: 3rem 2.5rem;
    }

    .logo {
      font-family: 'Space Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: #555;
      margin-bottom: 2.5rem;
    }

    .product-label {
      font-family: 'Space Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #ff0000;
      margin-bottom: 0.75rem;
    }

    h1 {
      font-family: 'Space Mono', monospace;
      font-size: 1.4rem;
      font-weight: 700;
      line-height: 1.3;
      margin-bottom: 0.5rem;
      letter-spacing: -0.01em;
    }

    .price-display {
      font-family: 'Space Mono', monospace;
      font-size: 2.8rem;
      font-weight: 700;
      color: #fff;
      margin: 1.5rem 0;
      line-height: 1;
    }

    .price-display span {
      font-size: 1rem;
      color: #555;
      vertical-align: super;
      font-weight: 400;
    }

    .divider {
      border: none;
      border-top: 1px solid #1a1a1a;
      margin: 1.5rem 0;
    }

    .includes {
      font-size: 0.8rem;
      color: #666;
      line-height: 1.8;
      margin-bottom: 2rem;
    }

    .includes li {
      list-style: none;
      padding-left: 1rem;
      position: relative;
    }

    .includes li::before {
      content: '—';
      position: absolute;
      left: 0;
      color: #333;
    }

    .btn-pay {
      width: 100%;
      background: #fff;
      color: #000;
      border: none;
      font-family: 'Space Mono', monospace;
      font-size: 0.8rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 1.1rem;
      cursor: pointer;
      transition: opacity 0.15s;
      font-weight: 700;
    }

    .btn-pay:hover { opacity: 0.85; }
    .btn-pay:disabled { opacity: 0.4; cursor: not-allowed; }

    .secure-note {
      text-align: center;
      font-size: 0.65rem;
      color: #333;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-top: 1rem;
    }

    .error-msg {
      color: #ff4444;
      font-size: 0.75rem;
      margin-top: 1rem;
      display: none;
      font-family: 'Space Mono', monospace;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">Black Room Miami</div>
    <div class="product-label">Academy</div>
    <h1>DJ Academy<br>Full Course</h1>

    <div class="price-display"><span>$</span>400</div>

    <hr class="divider">

    <ul class="includes">
      <li>Full access to the program</li>
      <li>Exclusive study materials</li>
      <li>Live sessions with instructors</li>
      <li>Black Room Academy certificate</li>
      <li>Access to the private community</li>
    </ul>

    <button class="btn-pay" id="payBtn" onclick="startCheckout()">
      Enroll Now — Pay $400
    </button>

    <p class="secure-note">Secure payment via Stripe · SSL encrypted</p>
    <p class="error-msg" id="errorMsg"></p>
  </div>

  <script>
    async function startCheckout() {
      const btn = document.getElementById('payBtn');
      const errEl = document.getElementById('errorMsg');

      btn.disabled = true;
      btn.textContent = 'Processing...';
      errEl.style.display = 'none';

      try {
        const res = await fetch('/api/course-checkout', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({})
        });

        const data = await res.json();

        if (data.url) {
          window.location.href = data.url;
        } else {
          throw new Error(data.error || 'Unknown error');
        }
      } catch (err) {
        btn.disabled = false;
        btn.textContent = 'Enroll Now — Pay $400';
        errEl.textContent = 'Error: ' + err.message;
        errEl.style.display = 'block';
      }
    }
  </script>
</body>
</html>
