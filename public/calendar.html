<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Black Room - Calendar</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@300;400;500;600;700;800&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=Archivo+Narrow:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/main.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="/js/global-header.js"></script>
  <style>
    :root {
      --bg-primary: #000000;
      --text-primary: #ffffff;
      --text-secondary: #888888;
      --border-color: rgba(255, 255, 255, 0.3);
      --border-thin: 0.5px solid rgba(255, 255, 255, 0.3);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      color: white;
      overflow-x: hidden;
      background: #000;
      padding-top: 70px;
    }

    #liquid-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      overflow: hidden;
    }

    #liquid-container canvas {
      width: 100% !important;
      height: 100% !important;
    }

    .bg-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.4);
      z-index: 1;
    }

    .calendar-container {
      position: relative;
      z-index: 2;
      min-height: calc(100vh - 70px);
      display: flex;
      flex-direction: column;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .no-radio-msg {
      font-family: 'Space Mono', monospace;
      font-size: 0.7rem;
      color: rgba(255, 255, 255, 0.3);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    /* ===== HEADER ===== */
    .calendar-header {
      padding: 2rem 3rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .month-title {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 3rem;
      font-weight: 400;
      letter-spacing: 0.02em;
      color: #fff;
    }

    .date-selector {
      display: flex;
      align-items: center;
      gap: 1rem;
      background: transparent;
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 30px;
      padding: 0.5rem 0.75rem;
    }

    .date-nav-btn {
      background: none;
      border: none;
      color: #fff;
      font-size: 0.9rem;
      cursor: pointer;
      padding: 0.5rem;
      transition: opacity 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .date-nav-btn:hover {
      opacity: 0.7;
    }

    .date-range {
      font-family: 'Space Mono', monospace;
      font-size: 0.85rem;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .date-range i {
      font-size: 0.8rem;
    }

    /* ===== MONTHLY GRID ===== */
    .monthly-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 0;
      flex: 1;
      border-top: var(--border-thin);
      border-left: var(--border-thin);
      overflow-y: auto;
      padding-bottom: 4rem;
    }

    .day-column {
      border-right: var(--border-thin);
      border-bottom: var(--border-thin);
      padding: 1.25rem 1rem;
      background: transparent;
      min-height: 180px;
      transition: background 0.3s ease;
      display: flex;
      flex-direction: column;
    }

    .day-column:hover {
      background: rgba(255, 255, 255, 0.05);
    }

    .day-column-header {
      margin-bottom: 1rem;
    }

    .day-name {
      font-family: 'Archivo Narrow', sans-serif;
      font-size: 1.4rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.02em;
      color: #fff;
      line-height: 1;
      margin-bottom: 0.15rem;
    }

    .day-month-date {
      font-family: 'Archivo Narrow', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.5);
      letter-spacing: 0.05em;
    }

    .day-number {
      font-family: 'Archivo Narrow', sans-serif;
      font-size: 2rem;
      font-weight: 700;
      color: #fff;
      line-height: 1;
    }

    .no-events-month {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 4rem 2rem;
      font-family: 'Space Mono', monospace;
      font-size: 0.85rem;
      color: rgba(255, 255, 255, 0.4);
      text-transform: uppercase;
      letter-spacing: 0.15em;
      text-align: center;
    }

    .events-list {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .event-row {
      display: flex;
      align-items: flex-start;
      gap: 0.75rem;
      font-family: 'Space Mono', monospace;
      font-size: 0.75rem;
      color: #fff;
      cursor: pointer;
      transition: opacity 0.3s ease;
      text-decoration: none;
    }

    .event-row:hover {
      opacity: 0.7;
    }

    .event-time {
      color: rgba(255, 255, 255, 0.6);
      white-space: nowrap;
      min-width: 45px;
    }

    .event-play {
      width: 14px;
      height: 14px;
      border: 1px solid rgba(255, 255, 255, 0.5);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .event-play i {
      font-size: 6px;
      margin-left: 1px;
    }

    .event-artist {
      color: #fff;
      line-height: 1.3;
    }

    .radio-event {
      cursor: default;
    }

    .radio-event .event-play {
      border-color: #ff0000;
      color: #ff0000;
    }

    .radio-event .event-artist {
      color: rgba(255, 255, 255, 0.85);
    }

    .radio-event .event-time {
      color: rgba(255, 0, 0, 0.6);
    }

    .day-column.empty {
      opacity: 0.5;
    }

    .no-events {
      font-family: 'Space Mono', monospace;
      font-size: 0.7rem;
      color: rgba(255, 255, 255, 0.3);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .visuals-credit {
      position: fixed;
      bottom: 1.5rem;
      left: 2rem;
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-family: 'Space Mono', monospace;
      font-size: 0.7rem;
      color: rgba(255, 255, 255, 0.5);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .visuals-credit::before {
      content: '+';
      font-size: 0.8rem;
    }

    .visuals-credit a {
      color: rgba(255, 255, 255, 0.7);
      text-decoration: none;
      transition: color 0.3s ease;
    }

    .visuals-credit a:hover {
      color: #fff;
    }

    @media (max-width: 1200px) {
      .weekly-grid {
        grid-template-columns: repeat(4, 1fr);
      }
    }

    @media (max-width: 900px) {
      .weekly-grid {
        grid-template-columns: repeat(2, 1fr);
      }
      
      .day-column {
        min-height: 300px;
      }

      .day-name {
        font-size: 1.4rem;
      }

      .day-number {
        font-size: 2rem;
      }
    }

    @media (max-width: 768px) {
      body {
        padding-top: 60px;
      }

      .calendar-header {
        flex-direction: column;
        gap: 1rem;
        padding: 1.5rem;
      }

      .week-title {
        font-size: 1.5rem;
      }

      .weekly-grid {
        grid-template-columns: 1fr;
      }

      .day-column {
        min-height: auto;
        padding: 1rem;
      }

      .visuals-credit {
        bottom: 1rem;
        left: 1rem;
        font-size: 0.6rem;
      }
    }

    @media (max-width: 480px) {
      .calendar-header {
        padding: 1rem;
      }

      .date-selector {
        padding: 0.4rem 0.6rem;
      }

      .date-range {
        font-size: 0.75rem;
      }
    }

    .loading-indicator {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 4rem;
      font-family: 'Space Mono', monospace;
      font-size: 0.8rem;
      color: rgba(255, 255, 255, 0.5);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
  </style>
  <script src="https://unpkg.com/@barba/core@2.9.7/dist/barba.umd.js"></script>
</head>
<body data-barba="wrapper">
  <main data-barba="container" data-barba-namespace="calendar">
  <div id="liquid-container"></div>
  <div class="bg-overlay"></div>

  <div class="calendar-container">

    <div class="calendar-header">
      <h1 class="month-title" id="month-title">January 2026</h1>
      
      <div class="date-selector">
        <button class="date-nav-btn" onclick="navigateMonth(-1)" aria-label="Previous month">
          <i class="fas fa-chevron-left"></i>
        </button>
        <div class="date-range">
          <i class="far fa-calendar-alt"></i>
          <span id="date-range-text">January 2026</span>
        </div>
        <button class="date-nav-btn" onclick="navigateMonth(1)" aria-label="Next month">
          <i class="fas fa-chevron-right"></i>
        </button>
      </div>
    </div>

    <div class="monthly-grid" id="monthly-grid">
      <div class="loading-indicator">Loading events...</div>
    </div>
  </div>

  <div class="visuals-credit">
    Visuals By <a href="#">Black Room</a>
  </div>

  <script>
    let currentMonth = new Date().getMonth();
    let currentYear = new Date().getFullYear();
    let allEvents = [];
    const MONTH_NAMES_FULL = ['January', 'February', 'March', 'April', 'May', 'June', 
                    'July', 'August', 'September', 'October', 'November', 'December'];
    const MONTH_NAMES_SHORT = ['JAN', 'FEB', 'MAR', 'APR', 'MAY', 'JUN', 'JUL', 'AUG', 'SEP', 'OCT', 'NOV', 'DEC'];
    const DAY_NAMES = ['SUNDAY', 'MONDAY', 'TUESDAY', 'WEDNESDAY', 'THURSDAY', 'FRIDAY', 'SATURDAY'];
    const DAY_NAMES_SHORT = ['SUN', 'MON', 'TUE', 'WED', 'THU', 'FRI', 'SAT'];

    function formatMonth(month, year) {
      return `${MONTH_NAMES_FULL[month]} ${year}`;
    }

    function navigateMonth(direction) {
      let attempts = 0;
      do {
        currentMonth += direction;
        if (currentMonth > 11) { currentMonth = 0; currentYear++; }
        if (currentMonth < 0) { currentMonth = 11; currentYear--; }
        attempts++;
      } while (getEventsForMonth(currentMonth, currentYear).length === 0 && attempts < 24);
      updateCalendar();
    }

    function updateCalendar() {
      const monthText = formatMonth(currentMonth, currentYear);
      document.getElementById('month-title').textContent = monthText;
      document.getElementById('date-range-text').textContent = monthText;
      renderMonth();
    }

    function getEventsForMonth(month, year) {
      const daysWithEvents = {};
      
      allEvents.forEach(event => {
        try {
          if (!event.date) return;
          // Use UTC date components to avoid timezone day-shift issues
          const dateStr = event.date.split('T')[0]; // "YYYY-MM-DD" in UTC
          const parts = dateStr.split('-');
          if (parts.length !== 3) return;
          const ey = parseInt(parts[0]);
          const em = parseInt(parts[1]) - 1; // 0-indexed month
          const ed = parseInt(parts[2]);
          if (isNaN(ey) || isNaN(em) || isNaN(ed)) return;

          if (em === month && ey === year) {
            const dateKey = dateStr;
            if (!daysWithEvents[dateKey]) {
              const dayOfWeek = new Date(ey, em, ed).getDay();
              daysWithEvents[dateKey] = {
                date: new Date(ey, em, ed),
                dayName: DAY_NAMES[dayOfWeek],
                dayNameShort: DAY_NAMES_SHORT[dayOfWeek],
                monthName: MONTH_NAMES_SHORT[em],
                dayNumber: ed,
                events: []
              };
            }
            daysWithEvents[dateKey].events.push(event);
          }
        } catch (e) {}
      });
      
      Object.values(daysWithEvents).forEach(day => {
        day.events.sort((a, b) => {
          const timeA = a.time || '00:00';
          const timeB = b.time || '00:00';
          return timeA.localeCompare(timeB);
        });
      });
      
      return Object.values(daysWithEvents).sort((a, b) => a.date - b.date);
    }

    function renderMonth() {
      const grid = document.getElementById('monthly-grid');
      const daysWithEvents = getEventsForMonth(currentMonth, currentYear);
      
      if (daysWithEvents.length === 0) {
        grid.innerHTML = '';
        return;
      }
      
      let html = '';
      
      daysWithEvents.forEach(day => {
        html += `
          <div class="day-column">
            <div class="day-column-header">
              <div class="day-name">${day.dayName}</div>
              <div class="day-month-date">${day.monthName}</div>
              <div class="day-number">${day.dayNumber}</div>
            </div>
            <div class="events-list">
              ${day.events.filter(event => {
                const n = ((event.name || event.title || '') + '').trim().toUpperCase();
                return n && n !== 'TBA' && n !== 'TBD';
              }).map(event => {
                if (event.type === 'radio') {
                  return `
                    <div class="event-row radio-event">
                      ${event.time ? `<span class="event-time">${event.time}</span>` : ''}
                      <span class="event-play"><i class="fas fa-broadcast-tower"></i></span>
                      <span class="event-artist">${event.name}</span>
                    </div>
                  `;
                }
                return `
                  <a href="${event.ticketUrl || event.youtubeUrl || event.url || '#'}" class="event-row">
                    ${event.time ? `<span class="event-time">${event.time}</span>` : ''}
                    <span class="event-play"><i class="fas fa-play"></i></span>
                    <span class="event-artist">${event.name || event.title}</span>
                  </a>
                `;
              }).join('')}
            </div>
          </div>
        `;
      });
      
      grid.innerHTML = html;
    }

    function parseVideoDate(title, publishedAt) {
      if (!title) return null;
      try {
        const months = { 
          JAN: 0, JANUARY: 0, FEB: 1, FEBRUARY: 1, MAR: 2, MARCH: 2, 
          APR: 3, APRIL: 3, MAY: 4, JUN: 5, JUNE: 5, 
          JUL: 6, JULY: 6, AUG: 7, AUGUST: 7, SEP: 8, SEPTEMBER: 8, 
          OCT: 9, OCTOBER: 9, NOV: 10, NOVEMBER: 10, DEC: 11, DECEMBER: 11 
        };
        
        const patterns = [
          /\|\s*([A-Z]+)\s+(\d{1,2})[\/\-](\d{2,4})/i,
          /\|\s*([A-Z]+)[\/\-](\d{1,2})[\/\-](\d{2,4})/i,
          /([A-Z]+)\s+(\d{1,2})[\/\-](\d{2,4})\s*$/i,
          /([A-Z]+)[\/\-](\d{1,2})[\/\-](\d{2,4})\s*$/i
        ];
        
        for (const pattern of patterns) {
          const match = title.match(pattern);
          if (match) {
            const monthName = match[1].toUpperCase();
            const day = parseInt(match[2]);
            let yearPart = parseInt(match[3]);
            
            if (yearPart < 100) {
              yearPart = 2000 + yearPart;
            }
            
            const month = months[monthName];
            
            if (month !== undefined && day >= 1 && day <= 31) {
              const parsed = new Date(yearPart, month, day);
              
              if (publishedAt) {
                const pub = new Date(publishedAt);
                const diffDays = (parsed.getTime() - pub.getTime()) / (1000 * 60 * 60 * 24);
                // If title date is more than 45 days before upload OR more than 365 days after, use publishedAt instead
                if (diffDays < -45 || diffDays > 365) {
                  return null;
                }
              }
              
              return parsed;
            }
          }
        }
        return null;
      } catch (e) {
        return null;
      }
    }

    function extractArtistName(title) {
      if (!title) return 'Unknown';
      const parts = title.split(' - ');
      return parts[0].trim() || title;
    }

    async function loadRadioScheduleEvents() {
      try {
        const res = await fetch('/api/radio-schedule');
        if (!res.ok) return [];
        const data = await res.json();
        const schedule = data.schedule || [];
        
        const today = new Date();
        today.setHours(0, 0, 0, 0);
        const currentMonthStart = new Date(today.getFullYear(), today.getMonth(), 1);
        
        const radioEvents = [];
        for (const entry of schedule) {
          const entryDate = new Date(entry.date + 'T00:00:00');
          const isThursday = entryDate.getDay() === 4;
          
          if (!isThursday) continue;
          if (entryDate < currentMonthStart) continue;
          
          for (const dj of entry.djs) {
            radioEvents.push({
              id: `radio-${entry.date}-${dj.name}`,
              date: entryDate.toISOString(),
              time: dj.time || '8:00 PM',
              name: dj.name,
              title: `${dj.name} - Black Room Radio`,
              type: 'radio',
              genre: dj.genre || ''
            });
          }
        }
        
        return radioEvents;
      } catch (e) {
        return [];
      }
    }

    async function loadEvents() {
      try {
        const [videosRes, radioEvents] = await Promise.all([
          fetch('/api/videos').catch(() => ({ ok: false })),
          loadRadioScheduleEvents()
        ]);
        
        let events = [];
        
        if (videosRes.ok) {
          const videos = await videosRes.json();
          if (Array.isArray(videos)) {
            events = videos.map(v => {
              const parsedDate = parseVideoDate(v.title, v.publishedAt);
              const artistName = extractArtistName(v.title);
              const publishedDate = v.publishedAt ? new Date(v.publishedAt) : null;
              const eventDate = parsedDate || publishedDate;
              
              return {
                id: v.id,
                date: eventDate ? eventDate.toISOString() : null,
                name: artistName,
                title: v.title,
                image: v.thumbnail,
                ticketUrl: `/watch.html?id=${v.id}`,
                youtubeId: v.id,
                type: 'video',
                publishedAt: v.publishedAt
              };
            }).filter(e => e.date);
          }
        }
        
        events = events.concat(radioEvents);
        
        allEvents = events;
        console.log(`📅 Loaded ${events.length - radioEvents.length} videos + ${radioEvents.length} radio schedule entries`);
        
        const today = new Date();
        currentMonth = today.getMonth();
        currentYear = today.getFullYear();
        
        updateCalendar();
        
      } catch (error) {
        console.error('Error loading events:', error);
        allEvents = [];
        updateCalendar();
      }
    }

    const liquidImages = [
      '/images/calendario/fondo_calendario.1.png',
      '/images/calendario/fondo_calendario.png',
      '/images/calendario/fondo_calendario.2.png.png',
      '/images/calendario/fondo_calendario.3.png.png'
    ];

    document.addEventListener('DOMContentLoaded', () => {
      loadEvents();
      
      const container = document.getElementById('liquid-container');
      if (container && typeof LiquidDistortion !== 'undefined') {
        new LiquidDistortion(container, liquidImages);
      }
    });
  </script>
  <script src="/js/liquid-distortion.js"></script>
  <script src="/js/page-transitions.js"></script>
  </main>
</body>
</html>
