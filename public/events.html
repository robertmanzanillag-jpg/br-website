<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Events – Black Room</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link rel="stylesheet" href="/css/main.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
      :root {
        --bg-primary: transparent;
        --bg-secondary: rgba(10, 10, 10, 0.85);
        --bg-tertiary: #111111;
        --text-color: #ffffff;
        --text-accent: #888888;
        --accent-primary: #fff;
        --border-color: #222222;
        --button-primary-bg: #fff;
        --button-primary-text: #000;
        --button-primary-hover: #eee;
        --shadow-dark: 0 4px 20px rgba(0, 0, 0, 0.6);
        --font-primary: "Inter", sans-serif;
        --font-display: "Space Mono", monospace;
      }

      main {
        padding-top: 100px;
      }
      .events-section {
        padding: 4rem 2rem;
        max-width: 1600px;
        margin: 0 auto;
      }
      .section-header {
        text-align: center;
        margin-bottom: 3rem;
      }
      .section-title {
        font-family: 'Space Mono', monospace;
        font-size: 2.5rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: var(--accent-primary);
      }
      .events-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
        gap: 2rem;
      }

      /* ===== TELETECH STYLE EVENT CARDS ===== */
      .event-card {
        display: flex;
        flex-direction: column;
        background: transparent;
        cursor: pointer;
        padding: 0;
      }

      .event-card-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        padding: 0 0 0.75rem 0;
        border-bottom: 1px solid rgba(255,255,255,0.1);
      }

      .event-card-venue {
        font-family: 'Space Mono', monospace;
        font-size: 0.9rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        line-height: 1.2;
        max-width: 180px;
      }

      .event-card-date {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        font-family: 'Space Mono', monospace;
        font-size: 0.85rem;
        text-transform: uppercase;
        white-space: nowrap;
      }

      .event-card-date::before {
        content: '';
        display: block;
        width: 8px;
        height: 8px;
        background: #fff;
      }

      .event-card-image {
        position: relative;
        aspect-ratio: 1/1;
        overflow: hidden;
        margin: 0.75rem 0;
      }

      .event-card-image img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: transform 0.6s ease;
      }

      .event-card:hover .event-card-image img {
        transform: scale(1.03);
      }

      /* Corner brackets on image */
      .event-card-image::before,
      .event-card-image::after {
        content: '';
        position: absolute;
        width: 20px;
        height: 20px;
        border-color: rgba(255,255,255,0.4);
        border-style: solid;
        z-index: 2;
        transition: border-color 0.3s ease;
      }

      .event-card-image::before {
        top: 8px;
        left: 8px;
        border-width: 1px 0 0 1px;
      }

      .event-card-image::after {
        top: 8px;
        right: 8px;
        border-width: 1px 1px 0 0;
      }

      .corner-bottom-left,
      .corner-bottom-right {
        position: absolute;
        width: 20px;
        height: 20px;
        border-color: rgba(255,255,255,0.4);
        border-style: solid;
        z-index: 2;
        transition: border-color 0.3s ease;
      }

      .corner-bottom-left {
        bottom: 8px;
        left: 8px;
        border-width: 0 0 1px 1px;
      }

      .corner-bottom-right {
        bottom: 8px;
        right: 8px;
        border-width: 0 1px 1px 0;
      }

      .event-card:hover .event-card-image::before,
      .event-card:hover .event-card-image::after,
      .event-card:hover .corner-bottom-left,
      .event-card:hover .corner-bottom-right {
        border-color: rgba(255,255,255,0.9);
      }

      .event-card-footer {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        padding: 0.75rem 0 0 0;
        border-top: 1px solid rgba(255,255,255,0.1);
      }

      .event-card-details {
        font-size: 0.8rem;
        color: var(--text-accent);
        text-transform: uppercase;
        letter-spacing: 0.05em;
        line-height: 1.5;
      }

      .event-card-details .venue-name {
        color: var(--text-color);
        font-weight: 500;
      }

      .event-card-details .location {
        font-size: 0.75rem;
      }

      .event-card-details .price {
        font-family: 'Space Mono', monospace;
        color: var(--text-color);
        margin-top: 0.25rem;
      }

      /* TICKETS button with corner brackets */
      .tickets-btn {
        position: relative;
        padding: 0.6rem 1.5rem;
        font-family: 'Space Mono', monospace;
        font-size: 0.75rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: var(--text-color);
        background: transparent;
        border: none;
        cursor: pointer;
        transition: color 0.3s ease;
        text-decoration: none;
        display: inline-block;
      }

      .tickets-btn::before,
      .tickets-btn::after {
        content: '';
        position: absolute;
        width: 8px;
        height: 8px;
        border-color: rgba(255,255,255,0.5);
        border-style: solid;
        transition: border-color 0.3s ease;
      }

      .tickets-btn::before {
        top: 0;
        left: 0;
        border-width: 1px 0 0 1px;
      }

      .tickets-btn::after {
        top: 0;
        right: 0;
        border-width: 1px 1px 0 0;
      }

      .tickets-btn .corner-bl,
      .tickets-btn .corner-br {
        position: absolute;
        width: 8px;
        height: 8px;
        border-color: rgba(255,255,255,0.5);
        border-style: solid;
        transition: border-color 0.3s ease;
      }

      .tickets-btn .corner-bl {
        bottom: 0;
        left: 0;
        border-width: 0 0 1px 1px;
      }

      .tickets-btn .corner-br {
        bottom: 0;
        right: 0;
        border-width: 0 1px 1px 0;
      }

      .event-card:hover .tickets-btn::before,
      .event-card:hover .tickets-btn::after,
      .event-card:hover .tickets-btn .corner-bl,
      .event-card:hover .tickets-btn .corner-br {
        border-color: rgba(255,255,255,1);
      }
      .loading-container,
      .no-events-message {
        grid-column: 1 / -1;
        text-align: center;
        padding: 4rem;
        background: var(--bg-tertiary);
        border-radius: 4px;
      }
      .loading-spinner {
        width: 40px;
        height: 40px;
        border: 3px solid var(--border-color);
        border-top-color: var(--accent-primary);
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin: 0 auto 1rem auto;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      

      /* ===== MINIMAL IMMEDIATE ANIMATIONS ===== */
      @keyframes fadeInUp {
        0% {
          opacity: 0;
          transform: translateY(20px);
        }
        100% {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes fadeIn {
        0% {
          opacity: 0;
        }
        100% {
          opacity: 1;
        }
      }

      /* Apply animations immediately */
      .section-title {
        opacity: 0;
        animation: fadeInUp 0.6s ease-out forwards;
        animation-delay: 0.1s;
      }

      .event-card {
        opacity: 0;
        animation: fadeInUp 0.5s ease-out forwards;
      }

      .event-card:nth-child(1) { animation-delay: 0.1s; }
      .event-card:nth-child(2) { animation-delay: 0.15s; }
      .event-card:nth-child(3) { animation-delay: 0.2s; }
      .event-card:nth-child(4) { animation-delay: 0.25s; }
      .event-card:nth-child(5) { animation-delay: 0.3s; }
      .event-card:nth-child(6) { animation-delay: 0.35s; }

      header {
        opacity: 0;
        animation: fadeIn 0.4s ease-out forwards;
      }

      /* ===== RESPONSIVE DESIGN ===== */
      @media (max-width: 768px) {
        .events-section {
          padding: 2rem 1rem;
        }
        .section-title {
          font-size: 2rem;
        }
        .events-grid {
          grid-template-columns: 1fr;
          gap: 1rem;
        }
        main {
          padding-top: 80px;
        }
      }

      @media (max-width: 480px) {
        .events-section {
          padding: 1.5rem 0.75rem;
        }
        .section-title {
          font-size: 1.5rem;
        }
        main {
          padding-top: 70px;
        }
      }

    /* ===== CART AND SEARCH MODAL STYLES ===== */
      .modal-overlay {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.7);
        z-index: 1001;
        transition: opacity 0.3s ease;
        opacity: 0;
      }
      .modal-overlay.visible {
        display: block;
        opacity: 1;
      }
      
      #cart-modal, #search-modal {
        display: none;
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 90%;
        max-width: 650px;
        background: var(--bg-secondary);
        border-radius: 10px;
        box-shadow: 0 8px 40px rgba(0, 0, 0, 0.9);
        z-index: 1002;
        overflow: hidden;
        border: 1px solid var(--border-color);
        opacity: 0;
        transition: opacity 0.3s ease, transform 0.3s ease;
        transform: translate(-50%, -45%);
      }
      
      #cart-modal.visible, #search-modal.visible {
        display: block;
        opacity: 1;
        transform: translate(-50%, -50%);
      }
      
      #search-modal {
        max-width: 600px;
      }
      
      #search-modal .modal-content {
        padding: 2rem;
      }
      
      #search-modal h2 {
        font-size: 1.8rem;
        margin-bottom: 1.5rem;
        color: var(--accent-primary);
        text-align: center;
      }
      
      #search-input {
        width: 100%;
        padding: 1rem;
        font-size: 1.1rem;
        background: var(--bg-tertiary);
        border: 2px solid var(--border-color);
        border-radius: 8px;
        color: var(--text-color);
        margin-bottom: 1rem;
      }
      
      #search-input:focus {
        outline: none;
        border-color: var(--accent-primary);
      }
      
      #search-button {
        width: 100%;
        padding: 1rem 2rem;
        background: var(--button-primary-bg);
        color: var(--button-primary-text);
        border: none;
        border-radius: 8px;
        font-weight: 700;
        font-size: 1.1rem;
        text-transform: uppercase;
        cursor: pointer;
        transition: all 0.3s ease;
      }
      
      #search-button:hover {
        background: var(--button-primary-hover);
        transform: translateY(-2px);
      }
      
      #search-results {
        margin-top: 1.5rem;
        max-height: 300px;
        overflow-y: auto;
      }
      
      .search-result {
        padding: 1rem;
        border-bottom: 1px solid var(--border-color);
        cursor: pointer;
        transition: background 0.3s ease;
      }
      
      .search-result:hover {
        background: var(--bg-tertiary);
      }
      
      .search-result:last-child {
        border-bottom: none;
      }
      
      #cart-modal .modal-header,
      #cart-modal .modal-footer {
        padding: 1.2rem 1.5rem;
        border-bottom: 1px solid var(--border-color);
        display: flex;
        justify-content: space-between;
        align-items: center;
        background: var(--bg-tertiary);
      }
      
      #cart-modal .modal-footer {
        border-top: 1px solid var(--border-color);
        border-bottom: none;
      }
      
      #cart-modal h3 {
        font-size: 1.5rem;
        color: #fff;
      }
      
      .close-btn {
        font-size: 2rem;
        color: var(--text-accent);
        transition: color 0.3s ease, transform 0.3s ease;
        line-height: 1;
        background: none;
        border: none;
        cursor: pointer;
      }
      
      .close-btn:hover {
        color: var(--accent-primary);
        transform: rotate(90deg);
      }

      /* Global liquid distortion background */
      #global-liquid-bg {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: -1;
        pointer-events: none;
        background-image: url('/images/black-room-tour-map.png');
        background-size: cover;
        background-position: center;
        filter: brightness(0.5) saturate(0.8);
      }
      
      /* Mobile: focus on South America */
      @media (max-width: 768px) {
        #global-liquid-bg {
          background-size: 250% auto;
          background-position: 80% 70%;
        }
      }
      
    </style>
    <script src="https://unpkg.com/@barba/core@2.9.7/dist/barba.umd.js"></script>
  </head>
  <body data-barba="wrapper">
    <!-- Global Liquid Distortion Background -->
    <div id="global-liquid-bg"></div>
    
    <!-- Modal Overlay -->
    <div id="modal-overlay" class="modal-overlay"></div>

    <!-- Cart Modal -->
    <div id="cart-modal">
      <div class="modal-header">
        <h3>SHOPPING CART</h3>
        <span class="close-btn" onclick="toggleCart(event)">×</span>
      </div>
      <div class="modal-body"></div>
      <div class="modal-footer">
        <div>Subtotal: $<span id="modal-subtotal">0.00</span></div>
        <button id="checkout-btn">Check Out →</button>
      </div>
    </div>

    <!-- Search Modal -->
    <div id="search-modal">
      <div class="modal-content">
        <span class="close-btn" onclick="toggleSearch(event)">×</span>
        <h2>Search</h2>
        <input
          type="text"
          id="search-input"
          placeholder="Buscar videos, eventos, productos..."
        />
        <button id="search-button">Search</button>
        <div id="search-results"></div>
      </div>
    </div>

    <main data-barba="container" data-barba-namespace="events">
      <section class="events-section">
        <div class="section-header">
          <h2 class="section-title">UPCOMING SHOWS</h2>
        </div>
        <div class="events-grid" id="events-container"></div>
      </section>
    </main>

    <script>
      const eventsContainer = document.getElementById("events-container");
      let allEvents = [];


      function formatDateShort(dateStr) {
        if (!dateStr) return 'TBA';
        const date = new Date(dateStr);
        if (isNaN(date)) return dateStr;
        const day = date.getDate();
        const month = date.toLocaleDateString('en-US', { month: 'short' }).toUpperCase();
        return `${day} ${month}`;
      }

      function createEventCard(event) {
        const hasImage = event.image || event.imageUrl;
        const imageUrl = event.image || event.imageUrl || '/images/events/default-event.jpg';
        const venue = event.venue || event.location || 'SECRET LOCATION';
        const location = event.location || 'FL, USA';
        const eventName = event.name || event.title || 'UPCOMING EVENT';
        const price = event.price && String(event.price).trim() ? event.price : '';
        const dateShort = formatDateShort(event.date);
        const ticketUrl = event.ticketLink || event.poshvipUrl || '#';
        
        return `
          <div class="event-card" onclick="window.open('${ticketUrl}', '_blank')">
            <div class="event-card-header">
              <div class="event-card-venue">${venue}</div>
              <div class="event-card-date">${dateShort}</div>
            </div>
            <div class="event-card-image">
              <img src="${imageUrl}" alt="${eventName}" loading="lazy" onerror="this.src='/images/events/default-event.jpg'">
              <div class="corner-bottom-left"></div>
              <div class="corner-bottom-right"></div>
            </div>
            <div class="event-card-footer">
              <div class="event-card-details">
                <div class="venue-name">${eventName}</div>
                <div class="location">${location}</div>
                ${price ? `<div class="price">${price}</div>` : ''}
              </div>
              <a href="${ticketUrl}" target="_blank" class="tickets-btn" onclick="event.stopPropagation()">
                TICKETS
                <span class="corner-bl"></span>
                <span class="corner-br"></span>
              </a>
            </div>
          </div>`;
      }

      async function fetchAndDisplayEvents() {
        if (!eventsContainer) return;

        eventsContainer.innerHTML = `<div class="loading-container"><div class="loading-spinner"></div><p>Loading events...</p></div>`;

        try {
          // Try Posh.vip events first (same as homepage)
          const poshRes = await fetch('/api/posh-events');
          const poshData = await poshRes.json();

          if (poshData.success && poshData.events && poshData.events.length > 0) {
            allEvents = poshData.events.map(e => ({
              id: e.slug,
              name: e.title || 'Upcoming Event',
              date: e.dateText || e.date || '',
              venue: e.venue || e.location || 'Miami, FL',
              location: e.location || 'FL, USA',
              image: e.image || '/images/events/default-event.jpg',
              price: e.price || '',
              ticketLink: e.poshUrl || e.ticketUrl || '#'
            }));
          } else {
            // Fallback to /api/events, filter out radio entries (same as homepage)
            const res = await fetch('/api/events');
            const apiEvents = await res.json();
            allEvents = apiEvents
              .filter(e => e.type !== 'radio')
              .map(e => ({
                id: e.id,
                name: e.name || e.title || 'Upcoming Event',
                date: e.date || '',
                venue: e.venue || e.location || 'Miami, FL',
                location: e.location || 'FL, USA',
                image: e.image || e.flyer_image || '/images/events/default-event.jpg',
                price: e.price || '',
                ticketLink: e.ticketUrl || e.posh_url || `/event-detail.html?id=${e.id}`
              }));
          }

          if (!allEvents || allEvents.length === 0) {
            eventsContainer.innerHTML = `<div class="no-events-message"><h3>No upcoming events available</h3><p>Check back soon for new events!</p></div>`;
          } else {
            eventsContainer.innerHTML = allEvents.map(createEventCard).join('');
          }
        } catch (error) {
          console.error('Failed to load events:', error);
          eventsContainer.innerHTML = `<div class="no-events-message"><h3>Error loading events</h3><p>Please try refreshing the page</p></div>`;
        }
      }

      // Cart and Search functionality for events page
      let cartVisible = false;
      let searchVisible = false;
      const modalOverlay = document.getElementById("modal-overlay");

      function toggleCart(event) {
        if (event) event.stopPropagation();
        cartVisible = !cartVisible;
        const modal = document.getElementById("cart-modal");
        if (cartVisible) {
          modal.classList.add("visible");
          modalOverlay.classList.add("visible");
        } else {
          modal.classList.remove("visible");
          modalOverlay.classList.remove("visible");
        }
      }

      function toggleSearch(event) {
        if (event) event.stopPropagation();
        searchVisible = !searchVisible;
        const searchModal = document.getElementById("search-modal");
        if (searchVisible) {
          searchModal.classList.add("visible");
          modalOverlay.classList.add("visible");
          document.getElementById("search-input").focus();
        } else {
          searchModal.classList.remove("visible");
          modalOverlay.classList.remove("visible");
        }
      }

      async function performSearch() {
        const query = document.getElementById("search-input").value.trim();
        const resultsDiv = document.getElementById("search-results");

        if (!query) {
          resultsDiv.innerHTML = '<p style="color: var(--text-accent); text-align: center;">Ingresa un término de búsqueda</p>';
          return;
        }

        resultsDiv.innerHTML = '<p style="color: var(--text-accent); text-align: center;">Buscando...</p>';

        try {
          // Search in events
          const eventResults = allEvents.filter(event => 
            event.name.toLowerCase().includes(query.toLowerCase()) ||
            (event.description && event.description.toLowerCase().includes(query.toLowerCase()))
          );

          let results = eventResults.map(event => ({
            type: "event",
            title: event.name,
            url: `event-detail.html?id=${event.id}`,
            thumbnail: event.image,
            description: event.description || '',
            price: event.price
          }));

          // Search in videos if API available
          try {
            const videoResponse = await fetch(`${window.location.origin}/api/youtube/search?q=${encodeURIComponent(query)}&maxResults=5`);
            if (videoResponse.ok) {
              const videoData = await videoResponse.json();
              const videos = videoData.items || [];
              videos.forEach((video) => {
                results.push({
                  type: "video",
                  title: video.snippet.title,
                  url: `watch.html?id=${video.id.videoId}`,
                  thumbnail: video.snippet.thumbnails.medium.url,
                  description: video.snippet.description,
                });
              });
            }
          } catch (error) {
            console.log("Video search not available");
          }

          if (results.length === 0) {
            resultsDiv.innerHTML = '<p style="color: var(--text-accent); text-align: center;">No se encontraron resultados</p>';
          } else {
            resultsDiv.innerHTML = results.map((result) => `
              <div class="search-result" onclick="location.href='${result.url}'; toggleSearch();">
                <div style="display: flex; align-items: center; gap: 1rem;">
                  <img src="${result.thumbnail || "https://via.placeholder.com/80x60"}" alt="${result.title}" style="width: 80px; height: 60px; object-fit: cover; border-radius: 4px;">
                  <div>
                    <h4 style="color: var(--accent-primary); margin-bottom: 0.5rem;">${result.title}</h4>
                    <p style="color: var(--text-accent); font-size: 0.9rem; margin-bottom: 0.3rem;">${result.type === "video" ? "Video" : result.type === "event" ? "Evento" : "Producto"}</p>
                    ${result.price ? `<p style="color: var(--accent-primary); font-weight: 600;">$${result.price.toFixed(2)}</p>` : ""}
                  </div>
                </div>
              </div>
            `).join("");
          }
        } catch (error) {
          console.error("Search error:", error);
          resultsDiv.innerHTML = '<p style="color: var(--error-color); text-align: center;">Error en la búsqueda</p>';
        }
      }

      // Close modals when clicking outside
      document.addEventListener("click", (event) => {
        if (cartVisible && !document.getElementById("cart-modal").contains(event.target) && !document.getElementById("cart-btn-nav").contains(event.target)) {
          toggleCart();
        }
        if (searchVisible && !document.getElementById("search-modal").contains(event.target) && !document.getElementById("search-btn-nav").contains(event.target)) {
          toggleSearch();
        }
        if (event.target === modalOverlay) {
          if (cartVisible) toggleCart();
          if (searchVisible) toggleSearch();
        }
      });

      // Keyboard shortcuts
      document.addEventListener("keydown", (event) => {
        if (event.key === "Escape") {
          if (cartVisible) toggleCart();
          if (searchVisible) toggleSearch();
        }
      });

      // Setup search button functionality
      setTimeout(() => {
        const searchButton = document.getElementById("search-button");
        const searchInput = document.getElementById("search-input");

        if (searchButton) {
          searchButton.onclick = performSearch;
        }

        if (searchInput) {
          searchInput.addEventListener("keypress", (e) => {
            if (e.key === "Enter") {
              performSearch();
            }
          });
        }
      }, 100);

      document.addEventListener("DOMContentLoaded", async () => {
          await fetchAndDisplayEvents();
        });
    </script>
