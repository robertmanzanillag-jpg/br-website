<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Black Room - Artículo</title>
    <meta name="description" content="Artículo completo de la comunidad underground de Black Room">
    
    <!-- CSS -->
    <link rel="stylesheet" href="/styles.css">
    <link rel="stylesheet" href="/community.css">
    <style>
        /* Body padding handled by global header component */
        
        /* Article Page Styles - Miami New Times Inspired */
        .article-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
            font-family: 'Georgia', serif;
            line-height: 1.7;
        }
        
        .article-header {
            margin-bottom: 40px;
            text-align: left;
        }
        
        .article-category {
            display: inline-block;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 20px;
            font-family: 'Roboto', sans-serif;
        }
        
        .article-title {
            font-size: 3rem;
            font-weight: bold;
            line-height: 1.2;
            margin-bottom: 20px;
            color: #ffffff;
            font-family: 'Roboto', sans-serif;
        }
        
        .article-meta {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
            font-size: 14px;
            color: #cccccc;
        }
        
        .article-author {
            font-weight: bold;
            color: #ffffff;
        }
        
        .article-date {
            color: #999999;
        }
        
        .article-hero-image {
            width: 100%;
            height: 400px;
            object-fit: cover;
            border-radius: 12px;
            margin-bottom: 40px;
        }
        
        .article-content {
            color: #ffffff;
            font-size: 18px;
            line-height: 1.8;
        }
        
        .article-content p {
            margin-bottom: 24px;
        }
        
        .article-content p:first-child {
            font-size: 20px;
            font-weight: 500;
            color: #e0e0e0;
        }
        
        .article-gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 16px;
            margin: 40px 0;
        }
        
        .article-gallery img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.3s ease;
        }
        
        .article-gallery img:hover {
            transform: scale(1.05);
        }
        
        .article-actions {
            margin-top: 40px;
            padding: 30px 0;
            border-top: 1px solid #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .article-share {
            display: flex;
            gap: 12px;
        }
        
        .share-btn {
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid #333;
            border-radius: 20px;
            color: #ffffff;
            text-decoration: none;
            font-size: 14px;
            transition: all 0.3s ease;
        }
        
        .share-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }
        
        .back-btn {
            padding: 12px 24px;
            background: linear-gradient(135deg, #333333 0%, #1a1a1a 100%);
            border: 2px solid #666666;
            border-radius: 25px;
            color: #ffffff;
            text-decoration: none;
            font-weight: bold;
            transition: all 0.3s ease;
        }
        
        .back-btn:hover {
            transform: translateY(-2px);
            background: linear-gradient(135deg, #4a4a4a 0%, #2a2a2a 100%);
            border-color: #888888;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.4);
        }
        
        /* Mobile Responsive */
        @media (max-width: 768px) {
            .article-container {
                padding: 20px 15px;
            }
            
            .article-title {
                font-size: 2.2rem;
            }
            
            .article-content {
                font-size: 16px;
            }
            
            .article-actions {
                flex-direction: column;
                gap: 20px;
                align-items: stretch;
            }
            
            .article-share {
                justify-content: center;
            }
        }
        
        /* Comments Section */
        .article-comments {
            margin-top: 60px;
            padding-top: 40px;
            border-top: 2px solid #333;
        }
        
        .comments-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        
        .comments-header h3 {
            color: #ffffff;
            font-size: 1.8rem;
            margin: 0;
            font-family: 'Roboto', sans-serif;
        }
        
        .comments-count {
            color: #999999;
            font-size: 14px;
        }
        
        .comment-form {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 40px;
            border: 1px solid #333;
        }
        
        .comment-form textarea {
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid #444;
            border-radius: 8px;
            padding: 15px;
            color: #ffffff;
            font-size: 16px;
            resize: vertical;
            min-height: 80px;
            font-family: inherit;
        }
        
        .comment-form textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 10px rgba(102, 126, 234, 0.3);
        }
        
        .comment-form-actions {
            display: flex;
            gap: 15px;
            margin-top: 15px;
            align-items: center;
        }
        
        .comment-form input[type="text"] {
            flex: 1;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid #444;
            border-radius: 6px;
            padding: 10px 15px;
            color: #ffffff;
            font-size: 14px;
        }
        
        .comment-form input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .comment-submit-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 6px;
            padding: 10px 20px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
        }
        
        .comment-submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }
        
        .comment-submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .comments-list {
            space-y: 20px;
        }
        
        .comment-item {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 8px;
            padding: 20px;
            border: 1px solid #333;
            margin-bottom: 15px;
        }
        
        .comment-author {
            font-weight: bold;
            color: #667eea;
            font-size: 14px;
            margin-bottom: 8px;
        }
        
        .comment-content {
            color: #ffffff;
            line-height: 1.6;
            margin-bottom: 10px;
        }
        
        .comment-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            color: #999999;
        }
        
        .comment-date {
            opacity: 0.8;
        }
        
        .comment-like-btn {
            background: none;
            border: none;
            color: #999999;
            cursor: pointer;
            transition: color 0.3s ease;
            font-size: 12px;
        }
        
        .comment-like-btn:hover {
            color: #ff6b6b;
        }
        
        .comment-like-btn.liked {
            color: #ff6b6b;
        }

        /* Article Suggestions Styles */
        .article-suggestions {
            margin-top: 50px;
            padding: 40px 0;
            border-top: 2px solid #333;
        }
        
        .suggestions-header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .suggestions-header h3 {
            font-size: 2rem;
            font-weight: bold;
            color: #ffffff;
            margin-bottom: 10px;
            font-family: 'Roboto', sans-serif;
        }
        
        .suggestions-header p {
            color: #999999;
            font-size: 16px;
            margin: 0;
        }
        
        .suggestions-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
            margin-top: 30px;
        }
        
        .suggestion-card {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.3s ease;
            border: 1px solid #333;
            cursor: pointer;
            position: relative;
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        
        .suggestion-card:hover {
            transform: translateY(-5px);
            border-color: #667eea;
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.2);
        }
        
        .suggestion-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
            background: #222;
            position: relative;
        }
        
        .suggestion-content {
            padding: 20px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        
        .suggestion-category {
            position: absolute;
            top: 12px;
            left: 12px;
            padding: 6px 12px;
            border-radius: 15px;
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #ffffff;
            z-index: 2;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
        
        .suggestion-title {
            font-size: 1.2rem;
            font-weight: 600;
            color: #ffffff;
            margin-bottom: 12px;
            line-height: 1.3;
            font-family: 'Roboto', sans-serif;
            flex-shrink: 0;
        }
        
        .suggestion-excerpt {
            color: #cccccc;
            font-size: 14px;
            line-height: 1.5;
            margin-bottom: 16px;
            flex: 1;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        .suggestion-footer {
            margin-top: auto;
            padding-top: 16px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        
        .suggestion-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            color: #999999;
            margin-bottom: 12px;
        }
        
        .suggestion-author {
            font-weight: 500;
            color: #667eea;
        }
        
        .suggestion-date {
            font-size: 11px;
            opacity: 0.8;
        }
        
        .suggestion-stats {
            display: flex;
            gap: 15px;
        }
        
        .suggestion-actions {
            display: flex;
            gap: 8px;
            justify-content: space-between;
            align-items: center;
        }
        
        .suggestion-read-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #ffffff;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        
        .suggestion-read-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        
        .suggestion-interaction-btns {
            display: flex;
            gap: 6px;
        }
        
        .suggestion-like-btn,
        .suggestion-comment-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: #cccccc;
            padding: 6px 10px;
            border-radius: 4px;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        
        .suggestion-like-btn:hover {
            background: rgba(255,80,80,0.2);
            border-color: #ff5050;
            color: #ff5050;
        }
        
        .suggestion-comment-btn:hover {
            background: rgba(102, 126, 234, 0.2);
            border-color: #667eea;
            color: #667eea;
        }

        /* Mobile Responsive for Suggestions */
        @media (max-width: 768px) {
            .article-suggestions {
                margin-top: 30px;
                padding: 30px 0;
            }
            
            .suggestions-header h3 {
                font-size: 1.5rem;
            }
            
            .suggestions-grid {
                grid-template-columns: 1fr;
                gap: 20px;
            }
            
            .suggestion-card {
                border-radius: 8px;
            }
            
            .suggestion-image {
                height: 160px;
            }
            
            .suggestion-content {
                padding: 15px;
            }
            
            .suggestion-title {
                font-size: 1.1rem;
            }
            
            .suggestion-excerpt {
                font-size: 13px;
            }
        }

        @media (max-width: 480px) {
            .suggestions-grid {
                gap: 15px;
            }
            
            .suggestion-image {
                height: 140px;
            }
            
            .suggestion-content {
                padding: 12px;
            }
            
            .suggestion-title {
                font-size: 1rem;
            }
        }

        /* Loading States */
        .loading {
            text-align: center;
            padding: 60px 20px;
            color: #cccccc;
        }
        
        .error {
            text-align: center;
            padding: 60px 20px;
            color: #ff6b6b;
        }
    </style>
</head>
<body>
    <!-- Load Header Component -->
    <div id="header-container"></div>

    <!-- Article Content -->
    <main class="article-container">
        <div id="article-loading" class="loading">
            <p>Cargando artículo...</p>
        </div>
        
        <div id="article-error" class="error" style="display: none;">
            <p>Error al cargar el artículo</p>
            <a href="/community.html" class="back-btn">Volver a Community</a>
        </div>
        
        <article id="article-content" style="display: none;">
            <header class="article-header">
                <div class="article-category" id="article-category"></div>
                <h1 class="article-title" id="article-title"></h1>
                <div class="article-meta">
                    <span class="article-author" id="article-author"></span>
                    <span class="article-date" id="article-date"></span>
                    <span id="article-views"></span>
                </div>
            </header>
            
            <div id="article-hero-container"></div>
            
            <div class="article-content" id="article-body"></div>
            
            <div id="article-gallery-container"></div>
            
            <!-- Comments Section -->
            <section class="article-comments" id="article-comments">
                <div class="comments-header">
                    <h3>Comentarios</h3>
                    <span class="comments-count" id="comments-count">0 comentarios</span>
                </div>
                
                <!-- Comment Form -->
                <div class="comment-form">
                    <textarea 
                        id="comment-textarea" 
                        placeholder="Comparte tu opinión sobre este artículo..."
                        rows="3"
                    ></textarea>
                    <div class="comment-form-actions">
                        <input 
                            type="text" 
                            id="comment-author" 
                            placeholder="Tu nombre (opcional)"
                            maxlength="50"
                        >
                        <button 
                            id="submit-comment" 
                            class="comment-submit-btn"
                        >
                            <i class="fas fa-paper-plane"></i> Comentar
                        </button>
                    </div>
                </div>
                
                <!-- Comments List -->
                <div class="comments-list" id="comments-list">
                    <!-- Comments will be loaded here -->
                </div>
            </section>

            <!-- Article Suggestions Section -->
            <section class="article-suggestions" id="article-suggestions">
                <div class="suggestions-header">
                    <h3>Artículos Relacionados</h3>
                    <p>Más contenido que te puede interesar</p>
                </div>
                
                <div class="suggestions-grid" id="suggestions-grid">
                    <!-- Suggestions will be loaded here -->
                </div>
            </section>

            <footer class="article-actions">
                <a href="/community.html" class="back-btn">← Volver a Community</a>
                <div class="article-share">
                    <a href="#" class="share-btn" id="share-twitter">Twitter</a>
                    <a href="#" class="share-btn" id="share-facebook">Facebook</a>
                    <a href="#" class="share-btn" id="share-whatsapp">WhatsApp</a>
                </div>
            </footer>
        </article>
    </main>

    <script src="/js/responsive-header.js"></script>
    <script>
        // Load header component
        document.addEventListener('DOMContentLoaded', async () => {
            try {
                const response = await fetch('/components/header.html');
                const headerHTML = await response.text();
                document.getElementById('header-container').innerHTML = headerHTML;
                
                // Initialize header after loading
                if (window.BlackRoomHeader) {
                    new window.BlackRoomHeader();
                }
            } catch (error) {
                console.error('Error loading header:', error);
            }
        });

        class ArticlePage {
            constructor() {
                this.postId = this.getPostIdFromURL();
                this.post = null;
                this.init();
            }
            
            getPostIdFromURL() {
                const params = new URLSearchParams(window.location.search);
                return params.get('id');
            }
            
            async init() {
                if (!this.postId) {
                    this.showError('No se especificó un artículo');
                    return;
                }
                
                await this.loadArticle();
                this.setupSharing();
                await this.loadArticleSuggestions();
            }
            
            async loadArticle() {
                try {
                    const response = await fetch(`/api/community/posts/${this.postId}`);
                    const data = await response.json();
                    
                    if (data.success && data.post) {
                        this.post = data.post;
                        this.renderArticle();
                        this.loadComments();
                        this.setupCommentForm();
                    } else {
                        this.showError('Artículo no encontrado');
                    }
                } catch (error) {
                    console.error('Error loading article:', error);
                    this.showError('Error al cargar el artículo');
                }
            }
            
            renderArticle() {
                const post = this.post;
                
                // Hide loading, show content
                document.getElementById('article-loading').style.display = 'none';
                document.getElementById('article-content').style.display = 'block';
                
                // Set title in page header
                document.title = `${post.title} - Black Room`;
                
                // Category
                const categoryEl = document.getElementById('article-category');
                categoryEl.textContent = post.category_icon + ' ' + post.category_name;
                categoryEl.style.backgroundColor = post.category_color;
                categoryEl.style.color = '#ffffff';
                
                // Title
                document.getElementById('article-title').textContent = post.title;
                
                // Meta information
                document.getElementById('article-author').textContent = post.author_name || 'Anonymous';
                document.getElementById('article-date').textContent = new Date(post.created_at).toLocaleDateString('es-ES', {
                    year: 'numeric',
                    month: 'long',
                    day: 'numeric'
                });
                document.getElementById('article-views').textContent = `${post.view_count || 0} vistas`;
                
                // Hero image
                this.renderHeroImage(post);
                
                // Content
                this.renderContent(post);
                
                // Gallery
                this.renderGallery(post);
            }
            
            renderHeroImage(post) {
                const container = document.getElementById('article-hero-container');
                
                if (post.image_urls && post.image_urls.length > 0) {
                    const img = document.createElement('img');
                    img.className = 'article-hero-image';
                    img.src = post.image_urls[0];
                    img.alt = post.title;
                    container.appendChild(img);
                }
            }
            
            renderContent(post) {
                const contentEl = document.getElementById('article-body');
                
                // Split content into paragraphs
                const paragraphs = post.content.split('\n\n');
                paragraphs.forEach(paragraph => {
                    if (paragraph.trim()) {
                        const p = document.createElement('p');
                        p.textContent = paragraph.trim();
                        contentEl.appendChild(p);
                    }
                });
            }
            
            renderGallery(post) {
                const container = document.getElementById('article-gallery-container');
                
                if (post.image_urls && post.image_urls.length > 1) {
                    const gallery = document.createElement('div');
                    gallery.className = 'article-gallery';
                    
                    // Skip first image (used as hero)
                    post.image_urls.slice(1).forEach(imageUrl => {
                        const img = document.createElement('img');
                        img.src = imageUrl;
                        img.alt = post.title;
                        img.onclick = () => this.openLightbox(imageUrl, post.title);
                        gallery.appendChild(img);
                    });
                    
                    container.appendChild(gallery);
                }
            }
            
            openLightbox(imageUrl, caption) {
                // Simple lightbox implementation
                const lightbox = document.createElement('div');
                lightbox.style.cssText = `
                    position: fixed;
                    top: 0;
                    left: 0;
                    width: 100%;
                    height: 100%;
                    background: rgba(0,0,0,0.9);
                    display: flex;
                    justify-content: center;
                    align-items: center;
                    z-index: 1000;
                    cursor: pointer;
                `;
                
                const img = document.createElement('img');
                img.src = imageUrl;
                img.style.cssText = `
                    max-width: 90%;
                    max-height: 90%;
                    border-radius: 8px;
                `;
                
                lightbox.appendChild(img);
                lightbox.onclick = () => document.body.removeChild(lightbox);
                document.body.appendChild(lightbox);
            }
            
            setupSharing() {
                const url = encodeURIComponent(window.location.href);
                const title = encodeURIComponent(this.post?.title || 'Artículo de Black Room');
                
                document.getElementById('share-twitter').href = 
                    `https://twitter.com/intent/tweet?text=${title}&url=${url}`;
                document.getElementById('share-facebook').href = 
                    `https://www.facebook.com/sharer/sharer.php?u=${url}`;
                document.getElementById('share-whatsapp').href = 
                    `https://wa.me/?text=${title}%20${url}`;
            }
            
            async loadComments() {
                if (!this.postId) return;
                
                try {
                    const response = await fetch(`/api/community/posts/${this.postId}/comments`);
                    const data = await response.json();
                    
                    if (data.success) {
                        this.renderComments(data.comments);
                        this.updateCommentsCount(data.comments.length);
                    }
                } catch (error) {
                    console.error('Error loading comments:', error);
                }
            }
            
            renderComments(comments) {
                const commentsList = document.getElementById('comments-list');
                
                if (comments.length === 0) {
                    commentsList.innerHTML = '<p style="color: #999999; text-align: center; padding: 40px;">Sé el primero en comentar este artículo</p>';
                    return;
                }
                
                commentsList.innerHTML = comments.map(comment => `
                    <div class="comment-item">
                        <div class="comment-author">${comment.author_name || 'Anónimo'}</div>
                        <div class="comment-content">${this.escapeHtml(comment.content)}</div>
                        <div class="comment-meta">
                            <span class="comment-date">${new Date(comment.created_at).toLocaleDateString('es-ES', {
                                year: 'numeric',
                                month: 'short',
                                day: 'numeric'
                            })}</span>
                            <button class="comment-like-btn" onclick="articlePage.likeComment(${comment.id})">
                                <i class="fas fa-heart"></i> ${comment.like_count || 0}
                            </button>
                        </div>
                    </div>
                `).join('');
            }
            
            updateCommentsCount(count) {
                const countElement = document.getElementById('comments-count');
                countElement.textContent = `${count} ${count === 1 ? 'comentario' : 'comentarios'}`;
            }
            
            setupCommentForm() {
                const submitBtn = document.getElementById('submit-comment');
                const textarea = document.getElementById('comment-textarea');
                
                submitBtn.addEventListener('click', () => this.submitComment());
                textarea.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter' && e.ctrlKey) {
                        this.submitComment();
                    }
                });
            }
            
            async submitComment() {
                const textarea = document.getElementById('comment-textarea');
                const authorInput = document.getElementById('comment-author');
                const submitBtn = document.getElementById('submit-comment');
                
                const content = textarea.value.trim();
                const authorName = authorInput.value.trim() || 'Anónimo';
                
                if (!content) {
                    this.showNotification('Por favor escribe un comentario', 'error');
                    return;
                }
                
                // Disable button while submitting
                submitBtn.disabled = true;
                submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Enviando...';
                
                try {
                    const response = await fetch(`/api/community/posts/${this.postId}/comments`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            content: content,
                            author_name: authorName
                        })
                    });
                    
                    const data = await response.json();
                    
                    if (data.success) {
                        // Clear form
                        textarea.value = '';
                        authorInput.value = '';
                        
                        // Reload comments
                        this.loadComments();
                        
                        this.showNotification('¡Comentario publicado!', 'success');
                    } else {
                        this.showNotification(data.error || 'Error al publicar comentario', 'error');
                    }
                } catch (error) {
                    console.error('Error posting comment:', error);
                    this.showNotification('Error al publicar comentario', 'error');
                } finally {
                    // Re-enable button
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = '<i class="fas fa-paper-plane"></i> Comentar';
                }
            }
            
            async likeComment(commentId) {
                try {
                    const response = await fetch(`/api/community/comments/${commentId}/like`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' }
                    });
                    
                    const data = await response.json();
                    
                    if (data.success) {
                        // Reload comments to update like counts
                        this.loadComments();
                    }
                } catch (error) {
                    console.error('Error liking comment:', error);
                }
            }
            
            escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }
            
            showNotification(message, type = 'info') {
                const notification = document.createElement('div');
                notification.style.cssText = `
                    position: fixed;
                    top: 20px;
                    right: 20px;
                    padding: 15px 20px;
                    border-radius: 8px;
                    color: white;
                    font-weight: bold;
                    z-index: 10000;
                    max-width: 300px;
                    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
                    background: ${type === 'success' ? '#00C851' : type === 'error' ? '#ff4444' : '#33b5e5'};
                `;
                notification.textContent = message;
                document.body.appendChild(notification);
                
                setTimeout(() => {
                    if (notification.parentNode) {
                        document.body.removeChild(notification);
                    }
                }, 4000);
            }
            
            async loadArticleSuggestions() {
                if (!this.post) return;
                
                try {
                    // Get related articles from same category or recent posts
                    const response = await fetch(`/api/community/posts?limit=6&exclude=${this.post.id}&category=${this.post.category_id || ''}`);
                    const data = await response.json();
                    
                    if (data.success && data.posts && data.posts.length > 0) {
                        this.renderArticleSuggestions(data.posts.slice(0, 3)); // Show max 3 suggestions
                    } else {
                        // Fallback: load recent posts if no category matches
                        const fallbackResponse = await fetch(`/api/community/posts?limit=6&exclude=${this.post.id}`);
                        const fallbackData = await fallbackResponse.json();
                        if (fallbackData.success && fallbackData.posts && fallbackData.posts.length > 0) {
                            this.renderArticleSuggestions(fallbackData.posts.slice(0, 3));
                        }
                    }
                } catch (error) {
                    console.error('Error loading article suggestions:', error);
                    // Hide suggestions section if error
                    document.getElementById('article-suggestions').style.display = 'none';
                }
            }
            
            renderArticleSuggestions(posts) {
                const suggestionsGrid = document.getElementById('suggestions-grid');
                if (!suggestionsGrid || !posts || posts.length === 0) return;
                
                suggestionsGrid.innerHTML = posts.map(post => {
                    const imageUrl = post.image_urls && post.image_urls[0] 
                        ? post.image_urls[0]
                        : `https://images.unsplash.com/photo-1514525253161-7a46d19cd819?w=400`;
                    
                    const categoryColor = post.category_color || '#667eea';
                    const categoryName = post.category_name || 'Community';
                    const categoryIcon = post.category_icon || '📝';
                    
                    const postDate = new Date(post.created_at).toLocaleDateString('es-ES', {
                        day: 'numeric',
                        month: 'short',
                        year: 'numeric'
                    });
                    
                    return `
                        <div class="suggestion-card">
                            <div class="suggestion-image" style="position: relative;">
                                <img src="${imageUrl}" alt="${this.escapeHtml(post.title)}"
                                     onerror="this.src='https://images.unsplash.com/photo-1514525253161-7a46d19cd819?w=400'"
                                     style="width: 100%; height: 100%; object-fit: cover;">
                                <div class="suggestion-category" style="background: ${categoryColor};">
                                    ${categoryIcon} ${categoryName}
                                </div>
                            </div>
                            <div class="suggestion-content">
                                <h4 class="suggestion-title">${this.escapeHtml(post.title)}</h4>
                                <p class="suggestion-excerpt">${this.escapeHtml(post.content.substring(0, 120))}...</p>
                                
                                <div class="suggestion-footer">
                                    <div class="suggestion-meta">
                                        <span class="suggestion-author">${post.author_name || 'Anonymous'}</span>
                                        <span class="suggestion-date">${postDate}</span>
                                    </div>
                                    
                                    <div class="suggestion-actions">
                                        <a href="/article.html?id=${post.id}" class="suggestion-read-btn">
                                            <i class="fas fa-book-open"></i> Leer Más
                                        </a>
                                        
                                        <div class="suggestion-interaction-btns">
                                            <button class="suggestion-like-btn" onclick="this.articleSuggestionLike(${post.id})" title="Me gusta">
                                                <i class="fas fa-heart"></i> ${post.like_count || 0}
                                            </button>
                                            <button class="suggestion-comment-btn" onclick="window.location.href='/article.html?id=${post.id}#comments'" title="Comentarios">
                                                <i class="fas fa-comment"></i> ${post.comment_count || 0}
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');
            }
            
            async articleSuggestionLike(postId) {
                try {
                    const response = await fetch(`/api/community/posts/${postId}/like`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' }
                    });
                    
                    const data = await response.json();
                    
                    if (data.success) {
                        // Reload suggestions to update like counts
                        this.loadArticleSuggestions();
                        this.showNotification('¡Like agregado!', 'success');
                    } else {
                        this.showNotification(data.error || 'Error al dar like', 'error');
                    }
                } catch (error) {
                    console.error('Error liking post:', error);
                    this.showNotification('Error al dar like', 'error');
                }
            }

            showError(message) {
                document.getElementById('article-loading').style.display = 'none';
                document.getElementById('article-error').style.display = 'block';
                document.querySelector('#article-error p').textContent = message;
            }
        }
        
        // Initialize when page loads
        let articlePage;
        document.addEventListener('DOMContentLoaded', () => {
            articlePage = new ArticlePage();
        });
    </script>
</body>
</html>
