<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Cart – Black Room</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link rel="stylesheet" href="/css/main.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="/js/global-header.js"></script>
    <style>
      body {
        background: #000;
        color: #fff;
        font-family: "Inter", sans-serif;
        padding-top: 80px;
        min-height: 100vh;
        overflow-x: hidden;
      }

      #liquid-bg {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 0;
      }

      .cart-container {
        position: relative;
        z-index: 2;
        max-width: 1000px;
        margin: 4rem auto;
        padding: 0 2rem;
      }

      .cart-header {
        border-bottom: 1px solid rgba(255,255,255,0.1);
        padding-bottom: 2rem;
        margin-bottom: 3rem;
        display: flex;
        justify-content: space-between;
        align-items: flex-end;
      }

      .cart-title {
        font-family: 'Space Mono', monospace;
        font-size: 2.5rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.1em;
      }

      .cart-items {
        display: flex;
        flex-direction: column;
        gap: 1.5rem;
      }

      .cart-item {
        position: relative;
        background: rgba(10, 10, 10, 0.8);
        backdrop-filter: blur(15px);
        -webkit-backdrop-filter: blur(15px);
        border: 1px solid rgba(255,255,255,0.05);
        padding: 1.5rem;
        display: grid;
        grid-template-columns: 120px 1fr auto;
        gap: 2rem;
        align-items: center;
        transition: all 0.3s ease;
      }

      .cart-item:hover {
        background: rgba(20, 20, 20, 0.9);
        border-color: rgba(255,255,255,0.1);
      }

      /* Corner brackets */
      .cart-item::before, .cart-item::after {
        content: '';
        position: absolute;
        width: 15px;
        height: 15px;
        border-color: rgba(255,255,255,0.2);
        border-style: solid;
        transition: border-color 0.3s ease;
      }
      .cart-item::before { top: -1px; left: -1px; border-width: 1px 0 0 1px; }
      .cart-item::after { top: -1px; right: -1px; border-width: 1px 1px 0 0; }

      .corner-bl, .corner-br {
        position: absolute;
        width: 15px;
        height: 15px;
        border-color: rgba(255,255,255,0.2);
        border-style: solid;
        transition: border-color 0.3s ease;
      }
      .corner-bl { bottom: -1px; left: -1px; border-width: 0 0 1px 1px; }
      .corner-br { bottom: -1px; right: -1px; border-width: 0 1px 1px 0; }

      .cart-item:hover::before, .cart-item:hover::after,
      .cart-item:hover .corner-bl, .cart-item:hover .corner-br {
        border-color: #fff;
      }

      .item-image {
        aspect-ratio: 1;
        background: rgba(0,0,0,0.5);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0.5rem;
      }

      .item-image img {
        max-width: 100%;
        max-height: 100%;
        object-fit: contain;
      }

      .item-info h3 {
        font-family: 'Space Mono', monospace;
        font-size: 1.1rem;
        text-transform: uppercase;
        margin-bottom: 0.5rem;
        letter-spacing: 0.05em;
      }

      .item-meta {
        font-family: 'Space Mono', monospace;
        font-size: 0.75rem;
        color: #888;
        text-transform: uppercase;
        letter-spacing: 0.1em;
      }

      .item-controls {
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 1rem;
      }

      .qty-control {
        display: flex;
        align-items: center;
        gap: 1rem;
        background: rgba(255,255,255,0.05);
        padding: 0.5rem;
        border: 1px solid rgba(255,255,255,0.1);
      }

      .qty-btn {
        background: transparent;
        border: 1px solid rgba(255,255,255,0.2);
        color: #fff;
        width: 30px;
        height: 30px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.2s;
        font-family: 'Space Mono', monospace;
      }

      .qty-btn:hover { border-color: #fff; background: #fff; color: #000; }

      .remove-btn {
        color: #888;
        background: transparent;
        border: none;
        cursor: pointer;
        font-family: 'Space Mono', monospace;
        font-size: 0.65rem;
        text-transform: uppercase;
        transition: color 0.2s;
        letter-spacing: 0.1em;
      }

      .remove-btn:hover { color: #ff4444; }

      .cart-summary {
        margin-top: 4rem;
        padding: 2.5rem;
        background: rgba(10, 10, 10, 0.8);
        backdrop-filter: blur(15px);
        -webkit-backdrop-filter: blur(15px);
        border: 1px solid rgba(255,255,255,0.05);
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 2rem;
      }

      .summary-line {
        display: flex;
        justify-content: space-between;
        width: 100%;
        font-family: 'Space Mono', monospace;
        font-size: 1.1rem;
        letter-spacing: 0.1em;
      }

      .summary-total {
        font-size: 2rem;
        font-weight: 700;
        color: #fff;
      }

      .checkout-btn {
        width: 100%;
        padding: 1.5rem;
        background: #fff;
        color: #000;
        border: none;
        font-family: 'Space Mono', monospace;
        font-size: 0.9rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.3em;
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
      }

      .checkout-btn:hover {
        background: #000;
        color: #fff;
        box-shadow: 0 0 30px rgba(255,255,255,0.1);
      }

      .empty-cart {
        text-align: center;
        padding: 10rem 0;
        font-family: 'Space Mono', monospace;
      }

      .empty-cart h2 {
        font-size: 1.5rem;
        text-transform: uppercase;
        letter-spacing: 0.2em;
        margin-bottom: 2rem;
        color: #fff;
      }

      .return-shop {
        display: inline-block;
        padding: 1rem 2rem;
        border: 1px solid #fff;
        color: #fff;
        text-decoration: none;
        font-size: 0.8rem;
        text-transform: uppercase;
        letter-spacing: 0.2em;
        transition: all 0.3s;
      }

      .return-shop:hover {
        background: #fff;
        color: #000;
      }

      /* Recommended Section */
      .recommended-section {
        margin-top: 4rem;
        padding-top: 3rem;
        border-top: 1px solid rgba(255,255,255,0.1);
      }

      .rec-title {
        font-family: 'Space Mono', monospace;
        font-size: 1.2rem;
        text-transform: uppercase;
        letter-spacing: 0.15em;
        margin-bottom: 2rem;
        color: #fff;
      }

      .rec-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 1.5rem;
      }

      .rec-card {
        background: rgba(10, 10, 10, 0.8);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255,255,255,0.05);
        padding: 1rem;
        transition: all 0.3s ease;
      }

      .rec-card:hover {
        border-color: rgba(255,255,255,0.2);
      }

      .rec-image {
        aspect-ratio: 1;
        position: relative;
        overflow: hidden;
        margin-bottom: 1rem;
      }

      .rec-image img {
        width: 100%;
        height: 100%;
        object-fit: contain;
        position: absolute;
        transition: opacity 0.3s ease;
      }

      .rec-image .img-back { opacity: 0; }
      .rec-card:hover .rec-image .img-front { opacity: 0; }
      .rec-card:hover .rec-image .img-back { opacity: 1; }

      .rec-info {
        text-align: center;
        margin-bottom: 1rem;
      }

      .rec-name {
        font-family: 'Space Mono', monospace;
        font-size: 0.75rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        margin-bottom: 0.5rem;
      }

      .rec-price {
        font-family: 'Space Mono', monospace;
        font-size: 0.9rem;
        color: #888;
      }

      .rec-sizes {
        display: flex;
        justify-content: center;
        gap: 0.5rem;
        flex-wrap: wrap;
      }

      .size-option {
        padding: 0.4rem 0.6rem;
        background: transparent;
        border: 1px solid rgba(255,255,255,0.2);
        color: #fff;
        font-family: 'Space Mono', monospace;
        font-size: 0.65rem;
        cursor: pointer;
        transition: all 0.2s ease;
      }

      .size-option:hover {
        background: #fff;
        color: #000;
        border-color: #fff;
      }

      @media (max-width: 900px) {
        .rec-grid { grid-template-columns: repeat(2, 1fr); }
      }

      @media (max-width: 768px) {
        .cart-item { grid-template-columns: 80px 1fr; gap: 1rem; padding: 1rem; }
        .item-controls { grid-column: 1 / -1; flex-direction: row; justify-content: space-between; align-items: center; }
        .cart-title { font-size: 1.8rem; }
        .rec-grid { grid-template-columns: repeat(2, 1fr); gap: 1rem; }
      }
    </style>
  </head>
  <body>
    <div id="liquid-bg"></div>

    <div class="cart-container">
      <div id="cart-content">
        <!-- Content injected by JS -->
      </div>
    </div>

    <script src="/js/liquid-distortion.js"></script>
    <script>
      const CART_KEY = "br_cart";
      const getCart = () => JSON.parse(localStorage.getItem(CART_KEY) || "[]");
      const saveCart = (c) => localStorage.setItem(CART_KEY, JSON.stringify(c));

      const products = [
        {id:"red-room-tshirt",name:"RED ROOM T-SHIRT",price:55,images:{front:"/images/products/red-room-front.jpg",back:"/images/products/red-room-back.jpg"},sizes:["S","M","L","XL"]},
        {id:"electric-tshirt",name:"ELECTRIC T-SHIRT",price:55,images:{front:"/images/products/electric-front.jpg",back:"/images/products/electric-back.jpg"},sizes:["S","M","L","XL"]},
        {id:"phoenix-tshirt",name:"PHOENIX T-SHIRT",price:55,images:{front:"/images/products/phoenix-front.jpg",back:"/images/products/phoenix-back.jpg"},sizes:["S","M","L","XL"]},
        {id:"timeless-tshirt",name:"TIMELESS T-SHIRT",price:55,images:{front:"/images/products/timeless-front.jpg",back:"/images/products/timeless-back.png"},sizes:["S","M","L","XL"]}
      ];

      function render() {
        const cart = getCart();
        const container = document.getElementById('cart-content');
        
        if (cart.length === 0) {
          container.innerHTML = `
            <div class="empty-cart">
              <h2>Your cart is empty</h2>
              <a href="/shop.html" class="return-shop">Return to Shop</a>
            </div>
          `;
          return;
        }

        const subtotal = cart.reduce((acc, item) => acc + (item.price * item.qty), 0);
        const cartIds = cart.map(i => i.id);
        const recommended = products.filter(p => !cartIds.includes(p.id)).slice(0, 4);

        container.innerHTML = `
          <div class="cart-header">
            <h1 class="cart-title">Your Cart</h1>
            <div class="item-meta">${cart.length} ITEMS</div>
          </div>
          <div class="cart-items">
            ${cart.map((item, idx) => `
              <div class="cart-item">
                <div class="corner-bl"></div><div class="corner-br"></div>
                <div class="item-image"><img src="${item.image}" alt="${item.name}"></div>
                <div class="item-info">
                  <h3>${item.name}</h3>
                  <div class="item-meta">Size: ${item.size}</div>
                  <button class="remove-btn" onclick="removeItem(${idx})">Remove Item</button>
                </div>
                <div class="item-controls">
                  <div style="font-family:'Space Mono'; font-weight:700; font-size:1.1rem;">$${(item.price * item.qty).toFixed(2)}</div>
                  <div class="qty-control">
                    <button class="qty-btn" onclick="updateQty(${idx}, -1)">-</button>
                    <span style="font-family:'Space Mono'; min-width:20px; text-align:center;">${item.qty}</span>
                    <button class="qty-btn" onclick="updateQty(${idx}, 1)">+</button>
                  </div>
                </div>
              </div>
            `).join('')}
          </div>
          <div class="cart-summary">
            <div class="summary-line">
              <span>Subtotal</span>
              <span class="summary-total">$${subtotal.toFixed(2)}</span>
            </div>
            <div class="summary-line" style="font-size:0.8rem; color:#888;">
              <span>Shipping & taxes calculated at checkout</span>
            </div>
            <button class="checkout-btn" onclick="checkout()">Proceed to Checkout →</button>
          </div>
          
          ${recommended.length > 0 ? `
          <div class="recommended-section">
            <h2 class="rec-title">You Might Also Like</h2>
            <div class="rec-grid">
              ${recommended.map(p => `
                <div class="rec-card" data-id="${p.id}">
                  <div class="rec-image">
                    <img src="${p.images.front}" class="img-front" alt="${p.name}"/>
                    <img src="${p.images.back}" class="img-back" alt="${p.name}"/>
                  </div>
                  <div class="rec-info">
                    <div class="rec-name">${p.name}</div>
                    <div class="rec-price">$${p.price}</div>
                  </div>
                  <div class="rec-sizes">
                    ${p.sizes.map(s => `<button class="size-option" onclick="quickAdd('${p.id}', '${s}')">${s}</button>`).join('')}
                  </div>
                </div>
              `).join('')}
            </div>
          </div>
          ` : ''}
        `;
      }

      function updateQty(idx, delta) {
        const cart = getCart();
        cart[idx].qty += delta;
        if (cart[idx].qty < 1) cart.splice(idx, 1);
        saveCart(cart);
        render();
      }

      function removeItem(idx) {
        const cart = getCart();
        cart.splice(idx, 1);
        saveCart(cart);
        render();
      }

      function quickAdd(productId, size) {
        const product = products.find(p => p.id === productId);
        if (!product) return;
        
        const cart = getCart();
        cart.push({
          id: productId,
          name: product.name,
          price: product.price,
          size: size,
          image: product.images.front,
          qty: 1
        });
        saveCart(cart);
        render();
      }

      async function checkout() {
        const cart = getCart();
        const res = await fetch("/api/create-checkout-session", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ cart: cart })
        });
        const data = await res.json();
        if (data.url) window.location.href = data.url;
      }

      document.addEventListener('DOMContentLoaded', () => {
        // Migrate old cart key if exists
        const oldCart = localStorage.getItem('cart');
        if (oldCart && !localStorage.getItem(CART_KEY)) {
          localStorage.setItem(CART_KEY, oldCart);
        }
        
        // Render cart first
        render();
        
        // Then try to initialize visual effects
        try {
          if (typeof initLiquidDistortion === 'function') {
            initLiquidDistortion('liquid-bg', ['/images/calendario/fondo_calendario.png']);
          }
        } catch(e) {
          console.log('Liquid effect not available');
        }
      });
    </script>
  </body>
</html>
