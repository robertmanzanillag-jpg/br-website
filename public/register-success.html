
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Successful - Black Room</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #000000, #1a1a1a);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .success-container {
            text-align: center;
            max-width: 500px;
            padding: 2rem;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            backdrop-filter: blur(10px);
        }
        
        .success-icon {
            font-size: 4rem;
            color: #00ff88;
            margin-bottom: 1rem;
        }
        
        h1 {
            color: #00ff88;
            margin-bottom: 1rem;
        }
        
        p {
            margin-bottom: 2rem;
            color: #cccccc;
        }
        
        .btn {
            display: inline-block;
            padding: 12px 24px;
            background: #00ff88;
            color: #000;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            transition: all 0.3s ease;
        }
        
        .btn:hover {
            background: #00cc6a;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="success-container">
        <div class="success-icon">✓</div>
        <h1>Registration Successful!</h1>
        <p>Your purchase has been processed successfully. We will send you an email with your order details.</p>
        <a href="index.html" class="btn">Back to Home</a>
    </div>
<script src="/js/responsive-header.js"></script>
</body>
</html>
